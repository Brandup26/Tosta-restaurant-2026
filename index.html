<!DOCTYPE html>

    <meta charset="UTF-8">

    <title>TOSTA - المنيو الكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #e62222; --bg: #0b0b0b; --card: #161616; --gold: #ffcc00; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 100px; }
        header { background: #000; padding: 20px; text-align: center; border-bottom: 3px solid var(--red); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 2.2rem; font-weight: 900; color: var(--red); margin: 0; }
        .container { max-width: 600px; margin: auto; padding: 10px; }
        .cat-box { background: var(--card); border-radius: 12px; margin-bottom: 10px; border: 1px solid #222; overflow: hidden; }
        .cat-btn { padding: 15px; background: #1a1a1a; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; color: var(--red); font-size: 1.1rem; }
        .items-list { display: none; padding: 5px; }
        .items-list.open { display: block; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #222; }
        .add-btn { background: var(--red); color: white; border: none; width: 35px; height: 35px; border-radius: 8px; font-size: 1.4rem; cursor: pointer; }
        
        /* السلة العائمة */
        .cart-fab { position: fixed; bottom: 20px; left: 20px; background: var(--red); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2000; box-shadow: 0 4px 15px rgba(230,34,34,0.5); cursor: pointer; }
        .badge { position: absolute; top: -5px; right: -5px; background: var(--gold); color: #000; width: 22px; height: 22px; border-radius: 50%; font-size: 0.8rem; font-weight: bold; display: flex; align-items: center; justify-content: center; }

        /* نافذة المقاسات */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
        .m-content { background: #1a1a1a; width: 100%; max-width: 350px; border-radius: 15px; padding: 20px; border: 1px solid var(--red); }
        .sz-row { background: #252525; padding: 12px; margin: 8px 0; border-radius: 10px; display: flex; justify-content: space-between; cursor: pointer; }
        
        .cart-p { position: fixed; bottom: -100%; left: 0; right: 0; background: #111; height: 80vh; z-index: 4000; border-radius: 20px 20px 0 0; transition: 0.4s; padding: 20px; overflow-y: auto; }
        .cart-p.show { bottom: 0; }
    </style>
</head>

    </div>
    <div id="cart-items"></div>

let cart = [];

function render() {
    const box = document.getElementById('menu-data');
    box.innerHTML = '';
    menu.forEach((c, i) => {
        let h = `<div class="cat-box"><div class="cat-btn" onclick="toggle(${i})">${c.cat} <span>▼</span></div><div class="items-list" id="l-${i}">`;
        c.items.forEach(it => {
            h += `<div class="item"><b>${it.n}</b><button class="add-btn" onclick='openSizes("${it.n}", ${JSON.stringify(it.p)})'>+</button></div>`;
        });
        box.innerHTML += h + `</div></div>`;
    });
}

function toggle(i) { document.getElementById(`l-${i}`).classList.toggle('open'); }

function openSizes(n, ps) {
    const b = document.getElementById('modal-body');
    let h = `<h3>${n}</h3><p>اختر الحجم / النوع:</p>`;
    for(let s in ps) h += `<div class="sz-row" onclick="addToCart('${n}','${s}',${ps[s]})"><span>${s}</span><span>${ps[s]} ج</span></div>`;
    h += `<button onclick="closeM()" style="width:100%; margin-top:10px; background:none; border:none; color:#666; cursor:pointer;">إلغاء</button>`;
    b.innerHTML = h;
    document.getElementById('modal').style.display = 'flex';
}

function closeM() { document.getElementById('modal').style.display = 'none'; }

function addToCart(n, s, p) {
    cart.push({ n, s, p });
    updateUI();
    closeM();
}

function updateUI() {
    document.getElementById('count').innerText = cart.length;
    let t = 0;
    document.getElementById('cart-items').innerHTML = cart.map((i, idx) => {
        t += i.p;
        return `<div class="item"><div>${i.n} (${i.s})</div><div>${i.p} ج <button onclick="rm(${idx})" style="color:red; background:none; border:none; cursor:pointer; font-weight:bold;">حذف</button></div></div>`;
    }).join('');
    document.getElementById('total-price').innerText = `الإجمالي: ${t} ج`;
}

function rm(i) { cart.splice(i, 1); updateUI(); }

function showCart() { document.getElementById('cart-p').classList.toggle('show'); }

function sendOrder() {
    if(!cart.length) return alert("السلة فارغة!");
    let msg = "طلب جديد من توستا:\n" + cart.map(i => `- ${i.n} (${i.s}) : ${i.p}ج`).join('\n') + `\n\n*الإجمالي: ${document.getElementById('total-price').innerText}*`;
    window.open(`https://wa.me/201030353060?text=${encodeURIComponent(msg)}`);
}

render();
