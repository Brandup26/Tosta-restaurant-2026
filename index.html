<script>
    const sheetId = '17SgECDAROBvoG2nakrWg2gjgD2DvctsxKFL-turn6-Q';
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

    let menuData = {};

    async function fetchMenu() {
        try {
            const response = await fetch(url);
            const text = await response.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            const rows = json.table.rows;

            rows.forEach((row, index) => {
                if (index === 0) return;
                const category = row.c[0]?.v || "أخرى";
                const item = {
                    name: row.c[1]?.v || "",
                    price1: row.c[2]?.v || null,
                    price2: row.c[3]?.v || null,
                    price3: row.c[4]?.v || null
                };
                if (!menuData[category]) menuData[category] = [];
                menuData[category].push(item);
            });

            renderNav();
            renderCategory(Object.keys(menuData)[0]);
        } catch (error) {
            console.error("Error:", error);
        }
    }

    function renderNav() {
        const nav = document.getElementById('category-nav');
        nav.innerHTML = '';
        Object.keys(menuData).forEach((cat, index) => {
            const btn = document.createElement('button');
            btn.className = `category-tab px-5 py-2 rounded-xl text-sm font-bold border border-zinc-700 bg-zinc-900 ${index === 0 ? 'active' : ''}`;
            btn.innerText = cat;
            btn.onclick = () => {
                document.querySelectorAll('.category-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderCategory(cat);
                btn.scrollIntoView({ behavior: 'smooth', inline: 'center' });
            };
            nav.appendChild(btn);
        });
    }

    function renderCategory(catName) {
        const container = document.getElementById('menu-container');
        container.innerHTML = `<h2 class="text-xl font-bold mb-6 text-red-500 flex items-center gap-2"><span class="w-2 h-2 bg-red-500 rounded-full"></span> ${catName}</h2>`;
        
        // التعديل هنا: تحديد المسميات بناءً على القسم وعدد الخانات
        let label1 = ""; let label2 = ""; let label3 = "";

        if (catName.includes("بيتزا") || catName.includes("فطير")) {
            label1 = "صغير"; label2 = "وسط"; label3 = "كبير";
        } else if (catName.includes("برجر")) {
            label1 = "فراخ"; label2 = "لحمة"; label3 = "";
        } else if (catName.includes("مكرونة")) {
            label1 = "أبيض"; label2 = "أحمر"; label3 = "";
        } else if (catName.includes("كريب حادق")) {
            label1 = "عادي"; label2 = "كونو"; label3 = "سوبر";
        } else if (catName.includes("شاورما")) {
            label1 = "فينو"; label2 = "سوري"; label3 = "XL";
        } else {
            label1 = "السعر"; label2 = ""; label3 = "";
        }

        menuData[catName].forEach(item => {
            const itemHtml = `
                <div class="price-card p-4 rounded-2xl mb-4 shadow-lg border border-white/5">
                    <h3 class="text-md font-bold mb-3 text-zinc-100">${item.name}</h3>
                    <div class="flex gap-2 text-center">
                        ${item.price1 ? `<div class="flex-1 bg-zinc-800/50 p-2 rounded-xl border border-white/5"><span class="block text-[10px] text-zinc-500 mb-1">${label1}</span><span class="text-white font-bold font-sans">${item.price1}</span><span class="text-[10px] text-zinc-400 mr-1">ج</span></div>` : ''}
                        ${item.price2 ? `<div class="flex-1 bg-zinc-800/50 p-2 rounded-xl border border-white/5"><span class="block text-[10px] text-zinc-500 mb-1">${label2}</span><span class="text-white font-bold font-sans">${item.price2}</span><span class="text-[10px] text-zinc-400 mr-1">ج</span></div>` : ''}
                        ${item.price3 ? `<div class="flex-1 bg-zinc-800/50 p-2 rounded-xl border border-white/5"><span class="block text-[10px] text-zinc-500 mb-1">${label3}</span><span class="text-white font-bold font-sans">${item.price3}</span><span class="text-[10px] text-zinc-400 mr-1">ج</span></div>` : ''}
                    </div>
                </div>
            `;
            container.innerHTML += itemHtml;
        });
    }

    fetchMenu();
</script>
