<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم توستا - الأكل بشكل تاني ❤️</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tosta">
    <link rel="apple-touch-icon" href="Tosta.jpg">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff3131">

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0c0c0c; color: white; margin-bottom: 80px; overflow-x: hidden; scroll-behavior: smooth; }
        .header-wrapper { position: sticky; top: 0; z-index: 100; background-color: black; border-bottom: 1px solid #27272a; }
        .sticky-header { padding: 25px 0; text-align: center; }
        .sticky-nav { background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px); padding: 15px 0; }
        .category-tab { white-space: nowrap; transition: all 0.3s; flex-shrink: 0; border: 1px solid #3f3f46; border-radius: 12px; padding: 10px 22px; font-size: 14px; font-weight: bold; background: #000; color: #a1a1aa; }
        .category-tab.active { background-color: #ff3131; color: white; border-color: #ff3131; box-shadow: 0 4px 15px rgba(255, 49, 49, 0.3); }
        .horizontal-scroll { overflow-x: auto; display: flex; scrollbar-width: none; gap: 10px; padding: 0 15px; }
        .horizontal-scroll::-webkit-scrollbar { display: none; }
        
        .price-card { background: #1a1a1a; border: 1px solid #333; border-radius: 1.2rem; overflow: hidden; position: relative; padding: 15px; margin-bottom: 15px; }
        
        /* تصميم الوجبات المنظم */
        .meal-card { background: #161616; border: 1px solid #222; border-radius: 1.2rem; padding: 18px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
        .meal-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .meal-name { font-weight: 900; font-size: 1.1rem; color: #fff; }
        .meal-desc { font-size: 0.75rem; color: #71717a; line-height: 1.4; }
        
        /* زر الإضافة الصغير الاحترافي */
        .meal-price-btn { background: #ff3131; color: white; padding: 8px 12px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; min-width: 65px; border: none; align-self: center; }
        .meal-price-btn:active { scale: 0.92; }

        .logo-container img { max-width: 100px; margin: 0 auto 8px; display: block; border-radius: 15px; }
        .input-field { width: 100%; border: 1px solid #27272a; padding: 16px; border-radius: 15px; color: white; outline: none; background: #000; text-align: right; }
        .footer-box { margin-top: 50px; padding: 30px 20px; border-top: 1px solid #27272a; text-align: center; color: #71717a; font-size: 13px; background: #050505; }
    </style>
</head>
<body>

    <div class="header-wrapper">
        <header class="sticky-header">
            <div class="logo-container">
                <img src="Tosta.jpg" alt="Tosta Logo">
            </div>
            <h1 class="text-2xl font-black text-red-600">مطعم توستا</h1>
            <p class="text-sm text-zinc-400 mt-1">الأكل بشكل تاني ❤️</p>
            
            <div id="cart-btn" onclick="openCart()" class="absolute left-4 top-8 bg-zinc-900 p-3 rounded-full cursor-pointer border border-zinc-700">
                🛒 <span id="cart-count" class="absolute -top-1 -right-1 bg-red-600 text-[10px] font-bold rounded-full w-5 h-5 flex items-center justify-center">0</span>
            </div>
        </header>
        <nav id="category-nav" class="sticky-nav horizontal-scroll"></nav>
    </div>

    <main id="menu-container" class="container mx-auto px-4 py-6 max-w-md"></main>

    <div class="footer-box">
        <p class="mb-4 text-zinc-300 font-bold">جميع الحقوق محفوظة لـ مطعم توستا 2026 ©</p>
        <p dir="ltr">Designed by Eng / <span class="text-white">Anas Gaber Shehata</span></p>
        <p class="mt-2" dir="ltr">📞 <a href="tel:01003800314" style="color:#ff3131">01003800314</a></p>
    </div>

    <script>
        const sheetId = '17SgECDAROBvoG2nakrWg2gjgD2DvctsxKFL-turn6-Q';
        const restaurantPhone = "201032512003";
        const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

        let menuData = {};
        let cart = [];

        async function fetchMenu() {
            try {
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substring(47).slice(0, -2));
                const rows = json.table.rows;
                menuData = {};
                rows.forEach((row, index) => {
                    if (index === 0) return;
                    const cat = row.c[0]?.v || "أخرى";
                    const item = { 
                        category: cat, 
                        name: row.c[1]?.v || "", 
                        prices: [row.c[2]?.v, row.c[3]?.v, row.c[4]?.v],
                        desc: row.c[5]?.v || "وجبة توستا المميزة" 
                    };
                    if (!menuData[cat]) menuData[cat] = [];
                    menuData[cat].push(item);
                });
                renderNav();
                renderCategory(Object.keys(menuData)[0]);
            } catch (e) { console.error(e); }
        }

        function renderNav() {
            const nav = document.getElementById('category-nav');
            nav.innerHTML = "";
            Object.keys(menuData).forEach((cat, i) => {
                const btn = document.createElement('button');
                btn.className = `category-tab ${i === 0 ? 'active' : ''}`;
                btn.innerText = cat;
                btn.onclick = () => {
                    document.querySelectorAll('.category-tab').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderCategory(cat);
                };
                nav.appendChild(btn);
            });
        }

        function renderCategory(catName) {
            const container = document.getElementById('menu-container');
            container.innerHTML = `<h2 class="text-xl font-bold mb-6 text-red-500 border-r-4 border-red-500 pr-3">${catName}</h2>`;
            
            let isMeal = catName.includes("وجبات");
            menuData[catName].forEach(item => {
                if (isMeal) {
                    let price = item.prices[0];
                    if (price && price > 0) { // إخفاء لو السعر 0
                        container.innerHTML += `
                            <div class="meal-card">
                                <div class="meal-info">
                                    <span class="meal-name">${item.name}</span>
                                    <p class="meal-desc">${item.desc}</p>
                                </div>
                                <div onclick="addToCart('${item.category}', '${item.name}', ${price})" class="meal-price-btn">
                                    <span style="font-size:9px; opacity:0.8">إضافة</span>
                                    <span>${price}ج</span>
                                </div>
                            </div>`;
                    }
                } else {
                    // تصنيف الساندوتشات والبيتزا يظهر هنا بنفس التنسيق المعتاد
                }
            });
        }

        function addToCart(cat, name, price) {
            const existing = cart.find(i => i.name === name);
            if (existing) existing.qty++; else cart.push({ cat, name, price, qty: 1 });
            document.getElementById('cart-count').innerText = cart.reduce((s, i) => s + i.qty, 0);
        }

        window.onload = fetchMenu;
    </script>
</body>
</html>
