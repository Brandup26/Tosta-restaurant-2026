<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tosta - توستا</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #e62222; --bg: #0b0b0b; --card: #161616; --gold: #ffcc00; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 70px; }
        header { text-align: center; padding: 15px; border-bottom: 2px solid var(--red); background: #000; }
        .logo { width: 65px; border-radius: 50%; border: 1px solid var(--red); }
        .container { max-width: 600px; margin: auto; padding: 10px; }
        
        .cat-btn { background: #1a1a1a; color: #fff; padding: 12px; border-radius: 8px; margin-top: 8px; cursor: pointer; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .items-box { display: none; margin-top: 5px; }
        .items-box.active { display: block; }

        .item-card { background: var(--card); padding: 12px; border-radius: 8px; margin-bottom: 6px; border-right: 4px solid var(--red); }
        .item-info { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        
        /* حل مشكلة الأحجام */
        .size-row { display: flex; gap: 6px; flex-wrap: wrap; }
        .size-btn { background: #222; border: 1px solid #444; color: #ccc; padding: 6px 10px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; flex-grow: 1; text-align: center; }
        .size-btn:hover { border-color: var(--gold); color: var(--gold); }
        .size-btn span { display: block; font-size: 0.7rem; color: var(--gold); }

        #cart-bar { position: fixed; bottom: 0; width: 100%; background: var(--red); color: #fff; padding: 12px 0; text-align: center; font-weight: bold; font-size: 0.95rem; cursor: pointer; z-index: 500; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #333; background: #111; color: #fff; font-family: 'Cairo'; box-sizing: border-box; }
        .btn-order { width: 100%; background: #25d366; color: #fff; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <img src="logo.jpg" class="logo">
    <h1 style="margin:5px 0; font-size:1.2rem;">مطعم TOSTA - توستا</h1>
</header>

<div class="container" id="menu-content"></div>

<div id="cart-bar" onclick="showCart()">🛒 السلة (<span id="total-val">0</span> ج)</div>

<div class="modal" id="cart-modal">
    <h3 style="color:var(--red)">تفاصيل الطلب</h3>
    <div id="cart-items" style="margin-bottom:20px;"></div>
    <input type="text" id="userName" placeholder="الاسم">
    <input type="text" id="userAddr" placeholder="العنوان بالتفصيل">
    <button class="btn-order" onclick="sendWhatsApp()">تأكيد وإرسال واتساب</button>
    <button onclick="hideCart()" style="width:100%; background:none; border:none; color:#666; margin-top:15px; font-family:'Cairo';">رجوع للمنيو</button>
</div>

<script>
// المنيو الكامل المستخرج من الصور
const menuData = [
    { title: "ساندوتشات (فينو - سوري - XL) 🌭", items: [
        { name: "بطاطس", p: { "فينو": 15, "سوري": 20, "XL": 30 } },
        { name: "كبدة اسكندراني", p: { "فينو": 20, "سوري": 30, "XL": 40 } },
        { name: "جبنة مقلية", p: { "فينو": 20, "سوري": 25, "XL": 40 } },
        { name: "بانية / زنجر / كريسبي", p: { "فينو": 55, "سوري": 70, "XL": 80 } },
        { name: "شيش طاووق", p: { "فينو": 50, "سوري": 80, "XL": 80 } },
        { name: "سجق اسكندراني", p: { "فينو": 50, "سوري": 60, "XL": 70 } }
    ]},
    { title: "ركن البيتزا 🍕", items: [
        { name: "مارجريتا", p: { "صغير": 75, "وسط": 85, "كبير": 100 } },
        { name: "مشكل جبن", p: { "صغير": 85, "وسط": 95, "كبير": 110 } },
        { name: "شاورما فراخ / لحمة", p: { "صغير": 95, "وسط": 125, "كبير": 140 } },
        { name: "تشيكن رانش / باربيكيو", p: { "صغير": 110, "وسط": 135, "كبير": 150 } },
        { name: "سي فود / جمبري", p: { "صغير": 105, "وسط": 140, "كبير": 170 } },
        { name: "بيتزا توستا (كينج)", p: { "صغير": 100, "وسط": 130, "كبير": 150 } }
    ]},
    { title: "كريب حادق (عادي - كونو - سوبر) 🌯", items: [
        { name: "بطاطس / بوم", p: { "عادي": 60, "كونو": 70, "سوبر": 100 } },
        { name: "شيدر / كيري / مكس جبن", p: { "عادي": 65, "كونو": 75, "سوبر": 110 } },
        { name: "بانية / زنجر / كريسبي", p: { "عادي": 85, "كونو": 95, "سوبر": 150 } },
        { name: "مكس فراخ توستا", p: { "عادي": 90, "كونو": 100, "سوبر": 150 } },
        { name: "سي فود / جمبري", p: { "عادي": 120, "كونو": 135, "سوبر": 170 } }
    ]},
    { title: "ركن البرجر (فراخ / لحم) 🍔", items: [
        { name: "كلاسيك", p: { "ساندوتش": 70 } },
        { name: "برجر تشيز / فاير تاك", p: { "ساندوتش": 80 } },
        { name: "برجر دليمار / تشيكن رانش", p: { "ساندوتش": 90 } },
        { name: "دبل دليمار / تربل دليمار", p: { "دبل": 150, "تربل": 170 } }
    ]},
    { title: "ركن الوجبات والريزو 🍱", items: [
        { name: "فاميلي استريبس (12 قطعة)", p: { "وجبة": 350 } },
        { name: "كريسبي استريبس (6 قطع)", p: { "وجبة": 200 } },
        { name: "ريزو (كبدة/شاورما/زنجر)", p: { "عادي": 70, "مكس": 90 } },
        { name: "وجبة شيش طاووق (9 قطع)", p: { "وجبة": 190 } }
    ]},
    { title: "ركن المكرونة 🍝", items: [
        { name: "مكرونة فراخ / مفروم", p: { "أبيض": 80, "أحمر": 80 } },
        { name: "نجرسكو / الفريدو", p: { "طبق": 90 } },
        { name: "سي فود / جمبري", p: { "طبق": 135 } }
    ]},
    { title: "ركن الفطير الحادق 🥐", items: [
        { name: "موتزاريلا / رومي / كيري", p: { "شرقي": 110, "اسكندراني": 120 } },
        { name: "مشكل لحوم / بسطرمة", p: { "شرقي": 150, "اسكندراني": 170 } },
        { name: "فطيرة توستا / الكينج", p: { "وسط": 150, "كبير": 160 } }
    ]},
    { title: "ساندوتشات الصاروووخ 🚀", items: [
        { name: "صاروخ مكس جبن", p: { "قطعة": 80 } },
        { name: "صاروخ زنجر / مكس فراخ", p: { "قطعة": 110 } },
        { name: "صاروخ شاورما لحمة", p: { "قطعة": 120 } }
    ]},
    { title: "الحلويات (فطير وكريب) 🍯", items: [
        { name: "سكر ولبن / كاستر", p: { "فطيرة": 50 } },
        { name: "شوكولاتة / نوتيلا", p: { "فطيرة": 80, "كريب": 80 } },
        { name: "لوتس / مكس توستا", p: { "فطيرة": 120, "كريب": 100 } }
    ]},
    { title: "إضافات 🍟", items: [
        { name: "باكت فارم / تشيز", p: { "وسط": 30, "كبير": 35 } },
        { name: "كول سلو / صوصات", p: { "علبة": 15 } }
    ] }
];

let cart = []; let total = 0;

function init() {
    const container = document.getElementById('menu-content');
    menuData.forEach((section, sIdx) => {
        let sectionHtml = `<div class="cat-btn" onclick="togg(${sIdx})">${section.title} <span>▼</span></div><div class="items-box" id="s-${sIdx}">`;
        section.items.forEach(item => {
            sectionHtml += `<div class="item-card"><div class="item-info"><b>${item.name}</b></div><div class="size-row">`;
            for (let size in item.p) {
                sectionHtml += `<button class="size-btn" onclick="addToCart('${item.name}', '${size}', ${item.p[size]})"><span>${size}</span>${item.p[size]}ج</button>`;
            }
            sectionHtml += `</div></div>`;
        });
        container.innerHTML += sectionHtml + `</div>`;
    });
}

function togg(i) { document.getElementById(`s-${i}`).classList.toggle('active'); }

function addToCart(n, s, p) {
    cart.push({ full: `${n} - ${s}`, price: p });
    total += p;
    document.getElementById('total-val').innerText = total;
}

function showCart() {
    if(cart.length === 0) return alert("السلة فارغة");
    document.getElementById('cart-modal').style.display = 'block';
    document.getElementById('cart-items').innerHTML = cart.map(i => `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${i.full}</span><span>${i.price} ج</span></div>`).join('');
}

function hideCart() { document.getElementById('cart-modal').style.display = 'none'; }

function sendWhatsApp() {
    let name = document.getElementById('userName').value;
    let addr = document.getElementById('userAddr').value;
    if(!name || !addr) return alert("اكتب الاسم والعنوان");
    let msg = `*طلب جديد من توستا*%0A*الاسم:* ${name}%0A*العنوان:* ${addr}%0A*الطلبات:*%0A${cart.map(i=> "- " + i.full).join('%0A')}%0A*الإجمالي:* ${total} ج`;
    window.open(`https://wa.me/201030353060?text=${msg}`);
}
init();
</script>
</body>
</html>
