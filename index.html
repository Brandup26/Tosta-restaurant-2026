<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOSTA - المنيو الكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff3232; --gold: #ffcc00; --bg: #0d0d0d; --card: #1a1a1a; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 30px; overflow-x: hidden; }
        header { background: #000; padding: 25px; text-align: center; border-bottom: 2px solid var(--red); }
        .logo { font-size: 2.8rem; font-weight: 900; color: var(--red); margin: 0; text-shadow: 0 0 15px rgba(255,50,50,0.4); }
        
        /* الأقسام الأفقية الذكية */
        .tabs-wrapper { position: sticky; top: 0; background: #111; z-index: 1000; border-bottom: 1px solid #333; }
        .tabs-container { display: flex; overflow-x: auto; padding: 12px; gap: 10px; scrollbar-width: none; }
        .tabs-container::-webkit-scrollbar { display: none; }
        .tab-btn { 
            background: #222; color: #fff; border: 1px solid #444; padding: 10px 22px; 
            border-radius: 50px; cursor: pointer; white-space: nowrap; font-weight: bold; transition: 0.3s;
        }
        .tab-btn.active { background: var(--red); border-color: var(--red); box-shadow: 0 0 10px rgba(255,50,50,0.3); }

        .container { max-width: 600px; margin: auto; padding: 15px; }
        .menu-section { display: none; }
        .menu-section.active { display: block; animation: fadeIn 0.4s ease; }
        
        .cat-title { color: var(--red); font-size: 1.4rem; margin: 25px 0 15px; display: flex; align-items: center; gap: 10px; }
        .cat-title::after { content: ""; flex: 1; height: 1px; background: #333; }

        /* تصميم الكارت الاحترافي */
        .menu-item { 
            background: var(--card); border-radius: 12px; padding: 14px; margin-bottom: 10px;
            border: 1px solid #222; display: flex; justify-content: space-between; align-items: center;
        }
        .item-info { flex: 1; }
        .item-name { font-weight: 700; font-size: 1.05rem; display: block; margin-bottom: 4px; }
        .item-desc { font-size: 0.75rem; color: #888; }
        .price-btns { display: flex; gap: 6px; }
        .p-btn { 
            background: #2a2a2a; color: var(--gold); border: 1px solid #444; 
            padding: 7px 10px; border-radius: 8px; font-weight: 800; font-size: 0.85rem;
            min-width: 55px; text-align: center;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header><h1 class="logo">TOSTA</h1></header>

<div class="tabs-wrapper">
    <div class="tabs-container">
        <div class="tab-btn active" onclick="showTab('sec1', this)">🍕 بيتزا وفطير</div>
        <div class="tab-btn" onclick="showTab('sec2', this)">🌯 شاورما وسندوتشات</div>
        <div class="tab-btn" onclick="showTab('sec3', this)">🍔 برجر وصاروخ</div>
        <div class="tab-btn" onclick="showTab('sec4', this)">🍱 وجبات ومكرونة</div>
        <div class="tab-btn" onclick="showTab('sec5', this)">🍯 كريب وحلو</div>
    </div>
</div>

<div class="container">
    <div id="sec1" class="menu-section active">
        <div class="cat-title">🍕 ركن البيتزا</div>
        <div id="list-pizza"></div>
        <div class="cat-title">🥐 الفطير الشرقي</div>
        <div id="list-fateer"></div>
    </div>

    <div id="sec2" class="menu-section">
        <div class="cat-title">🌯 قسم الشاورما</div>
        <div id="list-shawarma"></div>
        <div class="cat-title">🥪 ساندوتشات TOSTA</div>
        <div id="list-sandwiches"></div>
        <div class="cat-title">🍱 بوكسات العربي والماريا</div>
        <div id="list-boxes"></div>
    </div>

    <div id="sec3" class="menu-section">
        <div class="cat-title">🍔 ركن البرجر</div>
        <div id="list-burger"></div>
        <div class="cat-title">🚀 سندوتشات الصاروخ</div>
        <div id="list-sarokh"></div>
    </div>

    <div id="sec4" class="menu-section">
        <div class="cat-title">🍗 ركن الوجبات</div>
        <div id="list-meals"></div>
        <div class="cat-title">🍝 ركن المكرونة</div>
        <div id="list-pasta"></div>
        <div class="cat-title">🍚 ركن الريزو</div>
        <div id="list-rizo"></div>
    </div>

    <div id="sec5" class="menu-section">
        <div class="cat-title">🌮 كريب حادق</div>
        <div id="list-crepe-h"></div>
        <div class="cat-title">🍯 الفطير الحلو</div>
        <div id="list-sweet"></div>
        <div class="cat-title">🍟 إضافات</div>
        <div id="list-extra"></div>
    </div>
</div>

<script>

            {n:"مفروم", p:[95,120,135]}, {n:"بسطرمة", p:[95,125,150]}, {n:"سوسيس", p:[90,100,115]}, {n:"مشكل لحوم", p:[100,130,150]},
            {n:"شاورما لحمة", p:[100,125,140]}, {n:"شاورما فراخ", p:[95,120,135]}, {n:"تشيكن رانش", p:[110,135,150]}, {n:"تشيكن باربيكيو", p:[110,135,150]},
            {n:"زنجر", p:[95,120,140]}, {n:"بانية", p:[95,120,140]}, {n:"مكس فراخ", p:[100,130,150]}, {n:"جمبري", p:[100,130,160]},
            {n:"سي فود", p:[105,140,170]}, {n:"سوبر ستار", p:[100,120,145]}, {n:"بركان", p:[100,120,145]}, {n:"توستا", p:[100,130,150]},

            {n:"مفروم", p:[130,150]}, {n:"سجق", p:[130,150]}, {n:"بسطرمة", p:[150,170]}, {n:"سوسيس", p:[130,150]},
            {n:"مشكل لحوم", p:[150,160]}, {n:"شاورما لحمة", p:[150,160]}, {n:"شاورما فراخ", p:[140,150]}, {n:"تشيكن باربيكيو", p:[150,160]},
            {n:"تشيكن رانش", p:[150,160]}, {n:"زنجر", p:[140,150]}, {n:"بانية", p:[140,150]}, {n:"مكس فراخ", p:[150,170]},

            {n:"مكرونة جمبري", p:[110,110]}, {n:"مكرونة مكس لحوم", p:[110,110]}, {n:"مكرونة سي فود", p:[135,135]}
        ],
        rizo: [
            {n:"ريزو كبدة", p:[70]}, {n:"ريزو شاورما", p:[90]}, {n:"ريزو زنجر", p:[90]}, {n:"ريزو جمبري", p:[110]}, {n:"ريزو سي فود", p:[120]}
        ],
        "crepe-h": [
            {n:"بطاطس / لوم", p:[60,70,100]}, {n:"مشكل جبن", p:[75,85,125]}, {n:"شاورما لحمة", p:[85,95,140]},
            {n:"زنجر / بانية", p:[85,95,150]}, {n:"مكس فراخ", p:[90,100,170]}, {n:"سي فود", p:[120,135]}
        ],
        sweet: [
            {n:"سكر", p:[50]}, {n:"كاستر", p:[60]}, {n:"بوغاشة", p:[70]}, {n:"شوكولاتة", p:[90]},
            {n:"لوتس", p:[90]}, {n:"قشطة وعسل", p:[100]}, {n:"مكس فواكه", p:[110]}, {n:"بستاشيو", p:[130]}
        ],
        extra: [
            {n:"باكت فارم", p:[30]}, {n:"باكت تشيز", p:[35]}, {n:"كول سلو", p:[15]}, {n:"موتزاريلا استيكس", p:[40]}
        ]
    };

    function render() {
        for (let key in menuData) {
            const el = document.getElementById('list-' + key);
            if (el) {
                el.innerHTML = menuData[key].map(i => `
                    <div class="menu-item">
                        <div class="item-info">
                            <span class="item-name">${i.n}</span>
                            ${i.d ? `<span class="item-desc">${i.d}</span>` : ''}
                        </div>
                        <div class="price-btns">
                            ${i.p.map(price => `<div class="p-btn">${price}ج</div>`).join('')}
                        </div>
                    </div>
                `).join('');
            }
        }
    }

    function showTab(id, btn) {
        document.querySelectorAll('.menu-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    render();
</script>
</body>
</html>
