<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tosta Menu - منيو توستا الكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #e62222; --bg: #0b0b0b; --card: #161616; --gold: #ffcc00; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 70px; }
        header { text-align: center; padding: 15px; border-bottom: 2px solid var(--red); background: #000; }
        .container { max-width: 600px; margin: auto; padding: 10px; }
        .cat-btn { background: #1a1a1a; color: #fff; padding: 12px; border-radius: 8px; margin-top: 8px; cursor: pointer; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .items-box { display: none; margin-top: 5px; }
        .items-box.active { display: block; }
        .item-card { background: var(--card); padding: 12px; border-radius: 8px; margin-bottom: 6px; border-right: 4px solid var(--red); display: flex; justify-content: space-between; align-items: center; }
        .add-btn { background: var(--red); color: white; border: none; width: 35px; height: 35px; border-radius: 5px; font-size: 1.5rem; cursor: pointer; }
        #cart-bar { position: fixed; bottom: 0; width: 100%; background: var(--red); color: #fff; padding: 12px 0; text-align: center; font-weight: bold; z-index: 500; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; padding: 20px; border-radius: 10px; width: 85%; max-width: 400px; text-align: center; border: 1px solid var(--red); }
        .size-opt { background: #333; padding: 12px; margin: 10px 0; border-radius: 5px; cursor: pointer; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<header><h1>TOSTA - توستا</h1></header>

<div class="container" id="menu-content"></div>

<div id="cart-bar" onclick="showCart()">🛒 عرض الطلب (<span id="total-val">0</span> ج)</div>

<div class="modal" id="size-modal">
    <div class="modal-content">
        <h3 id="modal-title" style="color:var(--gold)">اختر الحجم</h3>
        <div id="size-options"></div>
        <button onclick="closeModal()">إلغاء</button>
    </div>
</div>

        { n: "ريزو كبدة", p: { "طبق": 70 } }, { n: "ريزو شاورما", p: { "طبق": 90 } }, { n: "ريزو زنجر", p: { "طبق": 90 } }, { n: "ريزو سي فود", p: { "طبق": 120 } }
    ]},

        { n: "بطاطس", p: { "فينو": 15, "سوري": 20, "XL": 30 } }, { n: "كبدة", p: { "فينو": 20, "سوري": 30, "XL": 40 } },
        { n: "جبنة مقلية", p: { "فينو": 20, "سوري": 25, "XL": 40 } }, { n: "بطاطس تشيز", p: { "فينو": 25, "سوري": 30, "XL": 40 } },
        { n: "بطاطس رومي", p: { "فينو": 30, "سوري": 35, "XL": 40 } }, { n: "بطاطس موتزاريلا", p: { "فينو": 30, "سوري": 35, "XL": 40 } },

        { n: "كفتة لحم", p: { "فينو": 60, "سوري": 70, "XL": 80 } }, { n: "كفتة فراخ", p: { "فينو": 60, "سوري": 70, "XL": 80 } },
        { n: "جمبري كريسبي", p: { "فينو": 80, "سوري": 90, "XL": 90 } }, { n: "سوبر كرانشي", p: { "فينو": 70, "سوري": 80, "XL": 80 } },
        { n: "صاروخ مكس جبن", p: { "صاروخ": 80 } }, { n: "صاروخ زنجر", p: { "صاروخ": 110 } }, { n: "صاروخ بانية", p: { "صاروخ": 100 } },
        { n: "صاروخ شاورما لحمة", p: { "صاروخ": 120 } }, { n: "صاروخ كفتة", p: { "صاروخ": 100 } }
    ]},
    { title: "ركن البرجر (16 صنف)", items: [
        { n: "كلاسيك فراخ/لحم", p: { "ساندوتش": 70 } }, { n: "برجر تشيز", p: { "ساندوتش": 80 } }, { n: "تشيكن رانش", p: { "ساندوتش": 90 } },
        { n: "فاير تاك", p: { "ساندوتش": 85 } }, { n: "برجر دليمار", p: { "ساندوتش": 100 } }, { n: "بيج فاير", p: { "ساندوتش": 85 } },
        { n: "زنجر تركي", p: { "ساندوتش": 85 } }, { n: "دبل تشيز", p: { "دبل": 120 } }, { n: "دبل دليمار", p: { "دبل": 150 } },
        { n: "دبل بيج فاير", p: { "دبل": 130 } }, { n: "كاوبوي زنجر", p: { "ساندوتش": 85 } }, { n: "زنجر بسطرمة", p: { "ساندوتش": 90 } },
        { n: "برجر لافا / أمريكان", p: { "ساندوتش": 85 } }, { n: "تربل دليمار", p: { "تربل": 170 } }, { n: "سماتش برجر", p: { "ساندوتش": 70 } }, { n: "هولي مكس", p: { "ساندوتش": 90 } }

        { n: "مشكل جبن", p: { "صغير": 85, "وسط": 95, "كبير": 110 } }, { n: "مفروم / سجق / سوسيس", p: { "صغير": 95, "وسط": 120, "كبير": 135 } },

        { n: "فطير مشكل جبن", p: { "شرقي": 120, "ايطالي": 130 } }, { n: "فطير مشكل لحوم", p: { "شرقي": 150, "اسكندراني": 170 } },
        { n: "فطير بسطرمة / سوسيس", p: { "شرقي": 130, "ايطالي": 140 } }, { n: "فطير شاورما / زنجر", p: { "شرقي": 150, "ايطالي": 160 } }
    ]},
    { title: "الكريب (حادق وحلو) (20 صنف)", items: [
        { n: "بطاطس / بوم", p: { "عادي": 60, "كونو": 70, "سوبر": 100 } }, { n: "شيدر / كيري / مشكل جبن", p: { "عادي": 75, "كونو": 85, "سوبر": 125 } },

        { n: "بانية / كريسبي / زنجر", p: { "عادي": 85, "كونو": 95, "سوبر": 150 } }, { n: "برجر / مكس فراخ", p: { "عادي": 85, "كونو": 95, "سوبر": 150 } },
        { n: "جمبري / سي فود", p: { "عادي": 120, "كونو": 135, "سوبر": 170 } }, { n: "كريب نوتيلا / لوتس", p: { "عادي": 80 } }, { n: "كريب نوتيلا موز", p: { "عادي": 90 } }
    ]},
    { title: "المكرونة والفتة والشاورما (23 صنف)", items: [
        { n: "مكرونة فراخ / سجق", p: { "طبق": 80 } }, { n: "نجرسكو / الفريدو", p: { "طبق": 90 } }, { n: "مكرونة سي فود", p: { "طبق": 135 } },
        { n: "فتة شاورما لحمة / فراخ", p: { "طبق": 130 } }, { n: "ماريا لحمة / فراخ", p: { "ساندوتش": 100 } }, { n: "بوكس عربي مكس", p: { "بوكس": 160 } }
    ]},
    { title: "الفطير الحلو والإضافات (22 صنف)", items: [
        { n: "فطير سكر ولبن / كاستر", p: { "فطيرة": 50 } }, { n: "فطير نوتيلا / لوتس", p: { "فطيرة": 100 } },
        { n: "باكت فارم / تشيز", p: { "وسط": 30, "كبير": 35 } }, { n: "موتزاريلا استيكس", p: { "4 قطع": 40 } }
    ]}
];

let cart = []; let total = 0;
function init() {
    const container = document.getElementById('menu-content');
    menuData.forEach((section, sIdx) => {
        let html = `<div class="cat-btn" onclick="togg(${sIdx})">${section.title} <span>▼</span></div><div class="items-box" id="s-${sIdx}">`;
        section.items.forEach(item => {
            html += `<div class="item-card"><div><b>${item.n}</b></div><button class="add-btn" onclick='openSizeModal("${item.n}", ${JSON.stringify(item.p)})'>+</button></div>`;
        });
        container.innerHTML += html + `</div>`;
    });
}
function togg(i) { document.getElementById(`s-${i}`).classList.toggle('active'); }
function openSizeModal(name, prices) {
    const optionsDiv = document.getElementById('size-options');
    document.getElementById('modal-title').innerText = name;
    optionsDiv.innerHTML = '';
    for (let s in prices) {
        optionsDiv.innerHTML += `<div class="size-opt" onclick="add('${name}', '${s}', ${prices[s]})"><span>${s}</span><span>${prices[s]} ج</span></div>`;
    }
    document.getElementById('size-modal').style.display = 'flex';
}
function closeModal() { document.getElementById('size-modal').style.display = 'none'; }
function add(n, s, p) {
    cart.push({ n: `${n} (${s})`, p });
    total += p;
    document.getElementById('total-val').innerText = total;
    closeModal();
}
function showCart() { alert("تم حفظ الطلبات في السلة، جاهزة للإرسال."); }
init();
</script>
</body>
</html>
