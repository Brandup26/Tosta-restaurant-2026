<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOSTA - الجزء الأول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #e62222; --bg: #0b0b0b; --card: #161616; --gold: #ffcc00; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; text-align: right; }
        .cat-title { color: var(--red); border-bottom: 2px solid var(--red); padding: 10px; margin: 20px 0; font-size: 1.5rem; }
        .item-row { background: var(--card); margin-bottom: 5px; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .prices { font-size: 0.85rem; color: var(--gold); display: flex; gap: 10px; }
        .p-box { background: #222; padding: 2px 8px; border-radius: 4px; }
    </style>
</head>
<body>

<h1 style="text-align:center; color:var(--red)">TOSTA MENU (P1)</h1>

<div class="cat-title">🍕 ركن البيتزا (إيطالي)</div>
<div id="pizza-list"></div>

<div class="cat-title">🥐 فطير شرقي (حادق)</div>
<div id="fateer-list"></div>

<div class="cat-title">🍝 ركن المكرونة والريزو</div>
<div id="pasta-list"></div>

<script>
const pizza = [
    {n:"مارجريتا", p:"ص:75 | و:85 | ك:100"},
    {n:"رومي / كيري", p:"ص:85 | و:95 | ك:110"},
    {n:"مشكل جبن", p:"ص:85 | و:95 | ك:110"},
    {n:"خضروات", p:"ص:75 | و:85 | ك:100"},
    {n:"مفروم / سجق / سوسيس", p:"ص:95 | و:110 | ك:125"},
    {n:"بسطرمة", p:"ص:100 | و:120 | ك:140"},
    {n:"مشكل لحوم", p:"ص:100 | و:130 | ك:150"},
    {n:"شاورما فراخ", p:"ص:95 | و:120 | ك:135"},
    {n:"شاورما لحمة", p:"ص:100 | و:125 | ك:140"},
    {n:"تشيكن باربيكيو / رانش", p:"ص:110 | و:135 | ك:150"},
    {n:"زنجر / بانية / كريسبي", p:"ص:95 | w:120 | ك:140"},
    {n:"مكس فراخ / توستا", p:"ص:100 | و:130 | ك:150"},
    {n:"جمبري", p:"ص:100 | و:130 | ك:160"},
    {n:"سي فود (جمبري/كابوريا/تونا)", p:"ص:105 | و:140 | ك:170"},
    {n:"تونا", p:"ص:100 | و:120 | ك:145"},
    {n:"مشروم", p:"ص:95 | و:115 | ك:135"},
    {n:"سوبر ستار (مكس لحوم+خضار)", p:"ص:100 | و:120 | ك:145"},
    {n:"بركان (مكس فراخ+لحوم)", p:"ص:110 | و:135 | ك:155"}
];

const fateer = [
    {n:"فطير مشكل جبن", p:"وسط:110 | كبير:135"},
    {n:"فطير سجق / سوسيس / مفروم", p:"وسط:125 | كبير:150"},
    {n:"فطير بسطرمة", p:"وسط:145 | كبير:175"},
    {n:"فطير مشكل لحوم", p:"وسط:145 | كبير:175"},
    {n:"فطير شاورما فراخ / لحمة", p:"وسط:140 | كبير:170"},
    {n:"فطير مكس فراخ / زنجر", p:"وسط:145 | كبير:175"},
    {n:"فطير تونا", p:"وسط:140 | كبير:170"},
    {n:"فطير جمبري / سي فود", p:"وسط:150 | كبير:180"}
];

const pasta = [
    {n:"مكرونة (فراخ / لحمة / مفروم)", p:"صوص أحمر:80 | أبيض:90"},
    {n:"مكرونة نيجرسكو", p:"طبق:90"},
    {n:"مكرونة الفريدو (وايت صوص)", p:"طبق:95"},
    {n:"مكرونة سي فود", p:"طبق:135"},
    {n:"مكرونة توستا (مكس)", p:"طبق:110"},
    {n:"ريزو سادة", p:"45"},
    {n:"ريزو (شاورما / زنجر / بانية)", p:"80"},
    {n:"ريزو (لحمة / كفتة)", p:"90"},
    {n:"ريزو (جمبري / سي فود)", p:"120"}
];

function draw(id, data) {
    document.getElementById(id).innerHTML = data.map(i => `
        <div class="item-row">
            <b>${i.n}</b>
            <div class="prices">${i.p.split('|').map(x=>`<span class="p-box">${x}</span>`).join('')}</div>
        </div>
    `).join('');
}

draw('pizza-list', pizza);
draw('fateer-list', fateer);
draw('pasta-list', pasta);
</script>
</body>
</html>
