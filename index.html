<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم توستا - دفع ذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0c0c0c; color: white; margin-bottom: 80px; overflow-x: hidden; }
        .header-wrapper { position: sticky; top: 0; z-index: 100; background-color: black; border-bottom: 1px solid #27272a; }
        .sticky-header { padding: 25px 0; text-align: center; }
        .sticky-nav { background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px); padding: 15px 0; }
        .category-tab { white-space: nowrap; transition: 0.3s; flex-shrink: 0; border: 1px solid #3f3f46; border-radius: 12px; padding: 10px 22px; font-size: 14px; font-weight: bold; background: #000; color: #a1a1aa; }
        .category-tab.active { background-color: #ff3131; color: white; border-color: #ff3131; }
        .horizontal-scroll { overflow-x: auto; display: flex; scrollbar-width: none; gap: 10px; padding: 0 15px; }

        /* كروت الوجبات */
        .meal-card { background: #161616; border: 1px solid #222; border-radius: 1.2rem; padding: 18px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
        .meal-info { flex: 1; }
        .meal-name { font-weight: 900; font-size: 1.1rem; color: #fff; }
        .meal-desc { font-size: 0.75rem; color: #71717a; line-height: 1.4; }
        .meal-price-btn { background: #ff3131; color: white; padding: 8px 14px; border-radius: 10px; font-weight: bold; cursor: pointer; text-align: center; min-width: 70px; }

        /* التصميم العادي */
        .price-card { background: #1a1a1a; border: 1px solid #333; border-radius: 1.2rem; padding: 15px; margin-bottom: 15px; }
        .plus-icon { position: absolute; top: 0; right: 0; background: #ff3131; color: white; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 14px; border-radius: 0 0 0 10px; }

        /* حقول الإدخال */
        .input-field { width: 100%; border: 1px solid #27272a; padding: 14px; border-radius: 12px; color: white; outline: none; background: #000; text-align: right; margin-bottom: 10px; font-size: 14px; }
        .input-field:focus { border-color: #ff3131; }
        .method-btn { flex: 1; padding: 15px; border-radius: 15px; border: 1px solid #3f3f46; background: #111; color: #a1a1aa; font-weight: bold; cursor: pointer; text-align: center; font-size: 13px; }
        .method-btn.active { border-color: #ff3131; color: white; background: rgba(255, 49, 49, 0.15); box-shadow: 0 0 15px rgba(255, 49, 49, 0.1); }
    </style>
</head>
<body>

    <div class="header-wrapper">
        <header class="sticky-header">
            <h1 class="text-2xl font-black text-red-600">مطعم توستا</h1>
            <p class="text-sm text-zinc-400 mt-1">الأكل بشكل تاني ❤️</p>
            <div id="cart-btn" onclick="openCart()" class="absolute left-4 top-8 bg-zinc-900 p-3 rounded-full border border-zinc-700">
                🛒 <span id="cart-count" class="bg-red-600 text-[10px] font-bold rounded-full w-5 h-5 inline-flex items-center justify-center">0</span>
            </div>
        </header>
        <nav id="category-nav" class="sticky-nav horizontal-scroll"></nav>
    </div>

    <main id="menu-container" class="container mx-auto px-4 py-6 max-w-md"></main>

    <div id="checkout-modal" class="fixed inset-0 z-[150] hidden bg-black/95 p-4 overflow-y-auto">
        <div class="bg-zinc-900 w-full max-w-md mx-auto rounded-3xl p-6 border border-zinc-700 shadow-2xl">
            <h2 class="text-xl font-bold mb-6 text-red-500 text-center">مراجعة طلبك</h2>
            
            <div id="cart-items-list" class="mb-4 space-y-2 max-h-40 overflow-y-auto pr-1"></div>
            <div id="total-price-display" class="text-center font-bold text-xl mb-6 text-white bg-zinc-800/50 py-3 rounded-2xl"></div>
            
            <div class="flex gap-2 mb-6">
                <div id="pay-cash" onclick="selectPayment('cash')" class="method-btn active">💵 كاش</div>
                <div id="pay-wallet" onclick="selectPayment('wallet')" class="method-btn">📱 فودافون كاش</div>
            </div>

            <div id="wallet-section" class="hidden animate-pulse">
                <div class="bg-zinc-800 border border-zinc-700 p-4 rounded-2xl mb-4">
                    <p class="text-xs text-zinc-400 mb-2">حول المبلغ على هذا الرقم:</p>
                    <div class="flex justify-between items-center bg-black p-3 rounded-xl border border-zinc-800">
                        <button onclick="copyNumber()" class="bg-red-600 text-[10px] px-3 py-1 rounded-lg">نسخ</button>
                        <span id="target-number" class="text-lg font-black tracking-widest">01032512003</span>
                    </div>
                </div>
                <input type="tel" id="sender-number" placeholder="رقم المحفظة الذي قمت بالتحويل منه" class="input-field border-red-900/50">
            </div>

            <div class="space-y-1">
                <input type="text" id="user-name" placeholder="الاسم بالكامل" class="input-field">
                <input type="tel" id="user-phone" placeholder="رقم الموبايل للتواصل" class="input-field">
                <textarea id="user-address" placeholder="العنوان (الشارع - الدور - رقم الشقة)" class="input-field h-20"></textarea>
            </div>

            <div class="mt-6 flex gap-2">
                <button onclick="sendToWhatsApp()" class="flex-1 bg-green-600 font-bold py-4 rounded-xl text-white shadow-lg active:scale-95 transition-transform">تأكيد وإرسال الطلب</button>
                <button onclick="closeCart()" class="px-6 bg-zinc-800 text-zinc-400 rounded-xl font-bold">رجوع</button>
            </div>
        </div>
    </div>

    <script>
        const sheetId = '17SgECDAROBvoG2nakrWg2gjgD2DvctsxKFL-turn6-Q';
        const restaurantPhone = "201032512003";
        const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

        let menuData = {};
        let cart = [];
        let paymentMethod = 'cash';

        async function fetchMenu() {
            try {
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substring(47).slice(0, -2));
                const rows = json.table.rows;
                menuData = {};
                rows.forEach((row, index) => {
                    if (index === 0) return;
                    const cat = row.c[0]?.v || "أخرى";
                    const item = { 
                        cat: cat, name: row.c[1]?.v || "", 
                        prices: [row.c[2]?.v, row.c[3]?.v, row.c[4]?.v],
                        desc: row.c[5]?.v || "وجبة توستا المميزة 🔥"
                    };
                    if (!menuData[cat]) menuData[cat] = [];
                    menuData[cat].push(item);
                });
                renderNav();
                renderCategory(Object.keys(menuData)[0]);
            } catch (e) { console.error(e); }
        }

        function renderNav() {
            const nav = document.getElementById('category-nav');
            nav.innerHTML = "";
            Object.keys(menuData).forEach((cat, i) => {
                const btn = document.createElement('button');
                btn.className = `category-tab ${i === 0 ? 'active' : ''}`;
                btn.innerText = cat;
                btn.onclick = () => {
                    document.querySelectorAll('.category-tab').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderCategory(cat);
                };
                nav.appendChild(btn);
            });
        }

        function renderCategory(catName) {
            const container = document.getElementById('menu-container');
            container.innerHTML = `<h2 class="text-xl font-bold mb-6 text-red-500 border-r-4 border-red-500 pr-3">${catName}</h2>`;
            let isMeal = catName.includes("وجبات");
            let labels = ["السعر", "وسط", "كبير"];

            menuData[catName].forEach(item => {
                if (isMeal) {
                    let price = item.prices.find(p => p > 0);
                    if (price) {
                        container.innerHTML += `
                            <div class="meal-card" onclick="addToCart('${item.cat}', '${item.name}', ${price})">
                                <div class="meal-info">
                                    <span class="meal-name">${item.name}</span>
                                    <p class="meal-desc">${item.desc}</p>
                                </div>
                                <div class="meal-price-btn">
                                    <span style="font-size:9px; opacity:0.8">إضافة</span><br>${price}ج
                                </div>
                            </div>`;
                    }
                } else {
                    let html = `<div class="price-card"><h3 class="font-bold text-zinc-100 mb-4">${item.name}</h3><div class="flex gap-2">`;
                    item.prices.forEach((p, i) => {
                        if (p > 0) {
                            html += `<div onclick="addToCart('${item.cat}', '${item.name} (${labels[i]})', ${p})" class="flex-1 bg-zinc-800 p-3 rounded-xl relative text-center">
                                <span class="block text-[10px] text-zinc-500">${labels[i]}</span>
                                <span class="font-bold">${p}ج</span>
                                <div class="plus-icon">+</div>
                            </div>`;
                        }
                    });
                    html += `</div></div>`;
                    container.innerHTML += html;
                }
            });
        }

        function addToCart(cat, name, price) {
            const existing = cart.find(i => i.name === name);
            if (existing) existing.qty++; else cart.push({ cat, name, price, qty: 1 });
            document.getElementById('cart-count').innerText = cart.reduce((s, i) => s + i.qty, 0);
        }

        function selectPayment(method) {
            paymentMethod = method;
            document.getElementById('pay-cash').classList.toggle('active', method === 'cash');
            document.getElementById('pay-wallet').classList.toggle('active', method === 'wallet');
            document.getElementById('wallet-section').classList.toggle('hidden', method === 'cash');
        }

        function copyNumber() {
            const num = document.getElementById('target-number').innerText;
            navigator.clipboard.writeText(num);
            alert("تم نسخ الرقم: " + num);
        }

        function openCart() {
            if (cart.length === 0) return alert("السلة فارغة!");
            const list = document.getElementById('cart-items-list');
            list.innerHTML = ""; let total = 0;
            cart.forEach(item => {
                total += item.price * item.qty;
                list.innerHTML += `<div class="flex justify-between text-xs bg-black p-3 rounded-xl border border-zinc-800">
                    <span class="text-zinc-500">${item.qty} × ${item.price}ج</span>
                    <span class="font-bold">${item.name}</span>
                </div>`;
            });
            document.getElementById('total-price-display').innerText = `إجمالي الحساب: ${total} جنيه`;
            document.getElementById('checkout-modal').classList.remove('hidden');
        }

        function closeCart() { document.getElementById('checkout-modal').classList.add('hidden'); }

        function sendToWhatsApp() {
            const name = document.getElementById('user-name').value.trim();
            const phone = document.getElementById('user-phone').value.trim();
            const addr = document.getElementById('user-address').value.trim();
            const senderNum = document.getElementById('sender-number').value.trim();

            if (!name || !phone || !addr) return alert("برجاء إكمال بيانات التوصيل");
            if (paymentMethod === 'wallet' && !senderNum) return alert("برجاء كتابة رقم المحفظة المحول منها");

            let payText = paymentMethod === 'cash' ? "💵 كاش عند الاستلام" : `📱 فودافون كاش (من رقم: ${senderNum})`;
            let msg = `*طلب جديد من مطعم توستا*\n\n👤 *الاسم:* ${name}\n📞 *الموبايل:* ${phone}\n📍 *العنوان:* ${addr}\n💳 *طريقة الدفع:* ${payText}\n\n🛒 *الطلبات:*\n`;
            
            let total = 0;
            cart.forEach(i => {
                msg += `• ${i.name} (عدد ${i.qty}) = ${i.qty * i.price}ج\n`;
                total += i.qty * i.price;
            });
            msg += `\n💰 *الإجمالي:* ${total} جنيه`;
            
            if(paymentMethod === 'wallet') msg += `\n\n⚠️ *مرفق صورة التحويل*`;
            
            window.open(`https://wa.me/${restaurantPhone}?text=${encodeURIComponent(msg)}`);
        }
        window.onload = fetchMenu;
    </script>
</body>
</html>
