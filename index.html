<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOSTA - المنيو الكامل والحصري</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #e62222; --bg: #0b0b0b; --card: #161616; --gold: #ffcc00; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 100px; }
        header { background: #000; padding: 20px; text-align: center; border-bottom: 3px solid var(--red); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 2.2rem; font-weight: 900; color: var(--red); margin: 0; }
        .container { max-width: 600px; margin: auto; padding: 10px; }
        .cat-box { background: var(--card); border-radius: 12px; margin-bottom: 10px; border: 1px solid #222; overflow: hidden; }
        .cat-btn { padding: 15px; background: #1a1a1a; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; color: var(--red); font-size: 1.1rem; }
        .items-list { display: none; padding: 5px; }
        .items-list.open { display: block; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #222; }
        .add-btn { background: var(--red); color: white; border: none; width: 35px; height: 35px; border-radius: 8px; font-size: 1.4rem; cursor: pointer; }
        
        /* السلة العائمة */
        .cart-fab { position: fixed; bottom: 20px; left: 20px; background: var(--red); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2000; box-shadow: 0 4px 15px rgba(230,34,34,0.5); }
        .badge { position: absolute; top: -5px; right: -5px; background: var(--gold); color: #000; width: 22px; height: 22px; border-radius: 50%; font-size: 0.8rem; font-weight: bold; display: flex; align-items: center; justify-content: center; }

        /* نافذة المقاسات والسلة */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
        .m-content { background: #1a1a1a; width: 100%; max-width: 350px; border-radius: 15px; padding: 20px; border: 1px solid var(--red); }
        .sz-row { background: #252525; padding: 12px; margin: 8px 0; border-radius: 10px; display: flex; justify-content: space-between; cursor: pointer; }
        .cart-p { position: fixed; bottom: -100%; left: 0; right: 0; background: #111; height: 80vh; z-index: 4000; border-radius: 20px 20px 0 0; transition: 0.4s; padding: 20px; }
        .cart-p.show { bottom: 0; }
    </style>
</head>
<body>

<header><h1 class="logo">TOSTA MENU</h1></header>

<div class="container" id="menu-data"></div>

<div class="cart-fab" onclick="showCart()"><div class="badge" id="count">0</div>🛒</div>

<div class="cart-p" id="cart-p">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
        <h3>طلباتك 🍔</h3><button onclick="showCart()" style="color:red; background:none; border:none; font-family:'Cairo';">إغلاق</button>
    </div>
    <div id="cart-items" style="overflow-y:auto; max-height:60%;"></div>
    <div style="padding-top:20px;">
        <h3 id="total-price">الإجمالي: 0 ج</h3>
        <button onclick="sendOrder()" style="width:100%; background:#25d366; color:white; border:none; padding:15px; border-radius:10px; font-weight:bold; font-family:'Cairo';">طلب عبر واتساب</button>
    </div>
</div>

<div class="modal" id="modal"><div class="m-content" id="modal-body"></div></div>

<script>
// تفريغ كامل للمنيو من الصور 1000165574.jpg و 1000165575.jpg
const menu = [
    { cat: "ركن البيتزا (إيطالي)", items: [
        { n: "مارجريتا", p: { "صغير": 75, "وسط": 85, "كبير": 100 } },
        { n: "رومي", p: { "صغير": 85, "وسط": 95, "كبير": 100 } },
        { n: "كيري", p: { "صغير": 85, "وسط": 95, "كبير": 110 } },
        { n: "مشكل جبن", p: { "صغير": 85, "وسط": 95, "كبير": 110 } },
        { n: "مفروم", p: { "صغير": 95, "وسط": 120, "كبير": 135 } },
        { n: "بسطرمة", p: { "صغير": 95, "وسط": 120, "كبير": 150 } },
        { n: "سجق / سوسيس", p: { "صغير": 90, "وسط": 100, "كبير": 115 } },
        { n: "مشكل لحوم", p: { "صغير": 100, "وسط": 130, "كبير": 150 } },
        { n: "شاورما لحمة / فراخ", p: { "صغير": 100, "وسط": 125, "كبير": 140 } },
        { n: "تشيكن باربيكيو / رانش", p: { "صغير": 110, "وسط": 135, "كبير": 150 } },
        { n: "جمبري / سي فود", p: { "صغير": 105, "وسط": 140, "كبير": 170 } },
        { n: "تونا", p: { "صغير": 100, "وسط": 120, "كبير": 145 } }
    ]},
    { cat: "ساندوتشات (فينو / سوري / XL)", items: [
        { n: "بطاطس", p: { "فينو": 15, "سوري": 20, "XL": 30 } },
        { n: "كبدة", p: { "فينو": 20, "سوري": 30, "XL": 40 } },
        { n: "جبنة مقلية", p: { "فينو": 20, "سوري": 25, "XL": 40 } },
        { n: "بطاطس تشيز / رومي", p: { "فينو": 25, "سوري": 30, "XL": 40 } },
        { n: "بانية / زنجر / كريسبي", p: { "فينو": 55, "سوري": 70, "XL": 80 } },
        { n: "سجق اسكندراني", p: { "فينو": 50, "سوري": 60, "XL": 70 } },
        { n: "تشيكن كوردن بلو", p: { "فينو": 70, "سوري": 80, "XL": 80 } },
        { n: "كفتة لحم / فراخ", p: { "فينو": 60, "سوري": 70, "XL": 80 } },
        { n: "جمبري كريسبي", p: { "فينو": 80, "سوري": 90, "XL": 90 } }
    ]},
    { cat: "كريب حادق", items: [
        { n: "بطاطس", p: { "عادي": 60, "كونو": 70, "سوبر": 100 } },
        { n: "شيدر / كيري", p: { "عادي": 65, "كونو": 75, "سوبر": 110 } },
        { n: "مشكل جبن", p: { "عادي": 75, "كونو": 85, "سوبر": 125 } },
        { n: "سجق / مفروم / سوسيس", p: { "عادي": 80, "كونو": 90, "سوبر": 125 } },
        { n: "بسطرمة", p: { "عادي": 85, "كونو": 100, "سوبر": 140 } },
        { n: "بانية / زنجر / كريسبي", p: { "عادي": 85, "كونو": 95, "سوبر": 150 } },
        { n: "جمبري / سي فود", p: { "عادي": 110, "كونو": 125, "سوبر": 170 } }
    ]},
    { cat: "ركن الوجبات", items: [
        { n: "فاميلي استريبس (12 قطعة)", p: { "وجبة": 350 } },
        { n: "كريسبي استريبس (6 قطع)", p: { "وجبة": 200 } },
        { n: "لايت استريبس (3 قطع)", p: { "وجبة": 120 } },
        { n: "فاميلي ميكس", p: { "وجبة": 330 } },
        { n: "فاميلي اكسترا", p: { "وجبة": 430 } },
        { n: "وجبة شيش طاووق", p: { "وجبة": 190 } },
        { n: "وجبة كوردن بلو", p: { "وجبة": 190 } },
        { n: "ميكس توستا", p: { "وجبة": 390 } }
    ]},
    { cat: "ركن المكرونة", items: [
        { n: "مكرونة فراخ / لحمة", p: { "أبيض": 80, "أحمر": 80 } },
        { n: "مكرونة نيجرسكو", p: { "صوص": 90 } },
        { n: "مكرونة جمبري / سي فود", p: { "أبيض": 110, "أحمر": 110 } },
        { n: "مكرونة الفريدو", p: { "صوص": 90 } }
    ]},
    { cat: "سندوتشات الصاروخ", items: [
        { n: "صاروخ مكس جبن", p: { "صاروخ": 80 } },
        { n: "صاروخ سجق / لحمة / بسطرمة", p: { "صاروخ": 100 } },
        { n: "صاروخ زنجر / بانية / كفتة", p: { "صاروخ": 110 } }
    ]},
    { cat: "ركن الفطير الحلو", items: [
        { n: "سكر وكاستر", p: { "فطيرة": 50 } },
        { n: "بغاشة / شوكولاتة", p: { "فطيرة": 70 } },
        { n: "مكس شوكولاتة ومكسرات", p: { "فطيرة": 100 } },
        { n: "فواكه وقشطة وعسل", p: { "فطيرة": 110 } }
    ]},
    { cat: "إضافات", items: [
        { n: "باكت فارم", p: { "إضافة": 30 } },
        { n: "باكت تشيز / موتزاريلا", p: { "إضافة": 35 } },
        { n: "كول سلو", p: { "إضافة": 15 } },
        { n: "صوص (تاتشيس/رانش)", p: { "إضافة": 20 } }
    ]}
];

let cart = [];

function render() {
    const box = document.getElementById('menu-data');
    menu.forEach((c, i) => {
        let h = `<div class="cat-box"><div class="cat-btn" onclick="toggle(${i})">${c.cat} <span>▼</span></div><div class="items-list" id="l-${i}">`;
        c.items.forEach(it => {
            h += `<div class="item"><b>${it.n}</b><button class="add-btn" onclick='openSizes("${it.n}", ${JSON.stringify(it.p)})'>+</button></div>`;
        });
        box.innerHTML += h + `</div></div>`;
    });
}

function toggle(i) { document.getElementById(`l-${i}`).classList.toggle('open'); }

function openSizes(n, ps) {
    const b = document.getElementById('modal-body');
    let h = `<h3>${n}</h3><p>اختر الحجم:</p>`;
    for(let s in ps) h += `<div class="sz-row" onclick="addToCart('${n}','${s}',${ps[s]})"><span>${s}</span><span>${ps[s]} ج</span></div>`;
    h += `<button onclick="closeM()" style="width:100%; margin-top:10px; background:none; border:none; color:#666; cursor:pointer;">إلغاء</button>`;
    b.innerHTML = h;
    document.getElementById('modal').style.display = 'flex';
}

function closeM() { document.getElementById('modal').style.display = 'none'; }

function addToCart(n, s, p) {
    cart.push({ n, s, p });
    updateUI();
    closeM();
}

function updateUI() {
    document.getElementById('count').innerText = cart.length;
    let t = 0;
    document.getElementById('cart-items').innerHTML = cart.map((i, idx) => {
        t += i.p;
        return `<div class="item"><div>${i.n} (${i.s})</div><div>${i.p} ج <button onclick="rm(${idx})" style="color:red; background:none; border:none; cursor:pointer;">X</button></div></div>`;
    }).join('');
    document.getElementById('total-price').innerText = `الإجمالي: ${t} ج`;
}

function rm(i) { cart.splice(i, 1); updateUI(); }

function showCart() { document.getElementById('cart-p').classList.toggle('show'); }

function sendOrder() {
    if(!cart.length) return alert("السلة فارغة!");
    let msg = "طلب جديد من توستا:\n" + cart.map(i => `- ${i.n} (${i.s}) : ${i.p}ج`).join('\n') + `\n\n*الإجمالي: ${document.getElementById('total-price').innerText}*`;
    window.open(`https://wa.me/201030353060?text=${encodeURIComponent(msg)}`);
}

render();
</script>
</body>
</html>
