<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم توستا - المنيو الرسمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0c0c0c; color: white; margin-bottom: 80px; overflow-x: hidden; }
        .header-wrapper { position: sticky; top: 0; z-index: 100; background-color: black; border-bottom: 1px solid #27272a; }
        .sticky-header { padding: 20px 0; text-align: center; }
        .sticky-nav { background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px); padding: 15px 0; }
        .category-tab { white-space: nowrap; transition: all 0.3s; flex-shrink: 0; border: 1px solid #3f3f46; border-radius: 12px; padding: 10px 22px; font-size: 14px; font-weight: bold; background: #000; color: #a1a1aa; }
        .category-tab.active { background-color: #ff3131; color: white; border-color: #ff3131; }
        .horizontal-scroll { overflow-x: auto; display: flex; scrollbar-width: none; gap: 10px; padding: 0 15px; }
        
        /* تصميم كروت الوجبات */
        .meal-card { background: #161616; border: 1px solid #222; border-radius: 1.2rem; padding: 18px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
        .meal-info { flex: 1; }
        .meal-name { font-weight: 900; font-size: 1.1rem; color: #fff; display: block; }
        .meal-desc { font-size: 0.75rem; color: #71717a; line-height: 1.4; margin-top: 4px; }
        .meal-price-btn { background: #ff3131; color: white; padding: 10px 15px; border-radius: 12px; font-weight: bold; text-align: center; min-width: 80px; }
        
        /* تصميم الكروت العادية */
        .price-card { background: #1a1a1a; border: 1px solid #333; border-radius: 1.2rem; padding: 15px; margin-bottom: 15px; }
        .plus-icon { position: absolute; top: 0; right: 0; background: #ff3131; color: white; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: 0 0 0 10px; }
    </style>
</head>
<body>

    <div class="header-wrapper">
        <header class="sticky-header">
            <h1 class="text-2xl font-black text-red-600">مطعم توستا</h1>
            <p class="text-sm text-zinc-400">الأكل بشكل تاني ❤️</p>
            <div id="cart-btn" onclick="openCart()" class="absolute left-4 top-6 bg-zinc-900 p-3 rounded-full cursor-pointer border border-zinc-700">
                🛒 <span id="cart-count" class="bg-red-600 text-[10px] rounded-full px-1.5">0</span>
            </div>
        </header>
        <nav id="category-nav" class="sticky-nav horizontal-scroll"></nav>
    </div>

    <main id="menu-container" class="container mx-auto px-4 py-6 max-w-md"></main>

    <script>
        const sheetId = '17SgECDAROBvoG2nakrWg2gjgD2DvctsxKFL-turn6-Q';
        const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

        let menuData = {};
        let cart = [];

        async function fetchMenu() {
            try {
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substring(47).slice(0, -2));
                const rows = json.table.rows;
                
                menuData = {};
                rows.forEach((row, index) => {
                    if (index === 0) return;
                    const cat = row.c[0]?.v || "أخرى";
                    const item = { 
                        name: row.c[1]?.v || "", 
                        prices: [row.c[2]?.v, row.c[3]?.v, row.c[4]?.v],
                        desc: row.c[5]?.v || "وجبة توستا المميزة"
                    };
                    if (!menuData[cat]) menuData[cat] = [];
                    menuData[cat].push(item);
                });
                renderNav();
                renderCategory(Object.keys(menuData)[0]);
            } catch (e) { console.error("Error loading menu:", e); }
        }

        function renderNav() {
            const nav = document.getElementById('category-nav');
            nav.innerHTML = "";
            Object.keys(menuData).forEach((cat, i) => {
                const btn = document.createElement('button');
                btn.className = `category-tab ${i === 0 ? 'active' : ''}`;
                btn.innerText = cat;
                btn.onclick = () => {
                    document.querySelectorAll('.category-tab').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderCategory(cat);
                };
                nav.appendChild(btn);
            });
        }

        function renderCategory(catName) {
            const container = document.getElementById('menu-container');
            container.innerHTML = `<h2 class="text-xl font-bold mb-4 text-red-500 border-r-4 border-red-500 pr-2">${catName}</h2>`;
            
            const isMealSection = catName.includes("وجبات");

            menuData[catName].forEach(item => {
                if (isMealSection) {
                    // عرض الوجبات بتصميم طولي (Meal Card)
                    const price = item.prices.find(p => p > 0);
                    if (price) {
                        container.innerHTML += `
                            <div class="meal-card" onclick="addToCart('${catName}', '${item.name}', ${price})">
                                <div class="meal-info">
                                    <span class="meal-name">${item.name}</span>
                                    <p class="meal-desc">${item.desc}</p>
                                </div>
                                <div class="meal-price-btn">
                                    <div class="text-[10px] opacity-80">اضافة</div>
                                    <div>${price}ج</div>
                                </div>
                            </div>`;
                    }
                } else {
                    // عرض الأصناف العادية (كريب، بيتزا، إلخ)
                    let html = `<div class="price-card"><h3 class="font-bold mb-3">${item.name}</h3><div class="flex gap-2">`;
                    const labels = ["صغير", "وسط", "كبير"]; // افتراضي
                    item.prices.forEach((p, i) => {
                        if (p > 0) {
                            html += `
                                <div onclick="addToCart('${catName}', '${item.name} (${labels[i]})', ${p})" class="flex-1 bg-zinc-800 p-3 rounded-xl relative text-center border border-zinc-700">
                                    <span class="block text-[10px] text-zinc-500">${labels[i]}</span>
                                    <span class="font-bold">${p}ج</span>
                                    <div class="plus-icon">+</div>
                                </div>`;
                        }
                    });
                    html += `</div></div>`;
                    container.innerHTML += html;
                }
            });
        }

        function addToCart(cat, name, price) {
            cart.push({ name, price });
            document.getElementById('cart-count').innerText = cart.length;
        }

        window.onload = fetchMenu;
    </script>
</body>
</html>
