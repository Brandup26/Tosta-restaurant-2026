<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tosta Menu | منيو توستا</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0c0c0c; color: white; }
        .category-tab { white-space: nowrap; transition: all 0.3s; }
        .category-tab.active { background-color: #ff3131; color: white; transform: scale(1.05); }
        .price-card { background: #1a1a1a; border: 1px solid #333; }
        .horizontal-scroll::-webkit-scrollbar { display: none; }
        .horizontal-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #ff3131; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header class="text-center py-6 shadow-lg bg-black">
        <h1 class="text-4xl font-bold text-red-600 tracking-widest">TOSTA</h1>
        <p class="text-gray-400 text-sm mt-2">طعم الجودة في كل لقمة</p>
    </header>

    <nav id="category-nav" class="horizontal-scroll sticky top-0 z-50 bg-black/90 backdrop-blur-md flex overflow-x-auto py-4 px-2 gap-3 border-b border-white/10">
        <div id="nav-loader" class="loader mx-auto"></div>
    </nav>

    <main id="menu-container" class="container mx-auto px-4 py-8 max-w-md">
        </main>

    <script>
        // رابط الشيت بتاعك بعد تحويله لـ JSON
        const sheetId = '17SgECDAROBvoG2nakrWg2gjgD2DvctsxKFL-turn6-Q';
        const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

        let menuData = {};

        async function fetchMenu() {
            try {
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                const rows = json.table.rows;

                // معالجة البيانات وتنظيمها حسب القسم
                rows.forEach((row, index) => {
                    if (index === 0) return; // تخطي العناوين
                    const category = row.c[0]?.v || "أخرى";
                    const item = {
                        name: row.c[1]?.v || "",
                        price1: row.c[2]?.v || "",
                        price2: row.c[3]?.v || "",
                        price3: row.c[4]?.v || ""
                    };

                    if (!menuData[category]) menuData[category] = [];
                    menuData[category].push(item);
                });

                renderNav();
                renderCategory(Object.keys(menuData)[0]); // عرض أول قسم أوتوماتيك
            } catch (error) {
                console.error("خطأ في جلب البيانات:", error);
            }
        }

        function renderNav() {
            const nav = document.getElementById('category-nav');
            nav.innerHTML = '';
            Object.keys(menuData).forEach((cat, index) => {
                const btn = document.createElement('button');
                btn.className = `category-tab px-6 py-2 rounded-full text-sm font-bold border border-white/20 bg-zinc-900 ${index === 0 ? 'active' : ''}`;
                btn.innerText = cat;
                btn.onclick = () => {
                    document.querySelectorAll('.category-tab').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderCategory(cat);
                    btn.scrollIntoView({ behavior: 'smooth', inline: 'center' });
                };
                nav.appendChild(btn);
            });
        }

        function renderCategory(catName) {
            const container = document.getElementById('menu-container');
            container.innerHTML = `<h2 class="text-2xl font-bold mb-6 text-center text-white border-b-2 border-red-600 inline-block pb-1">${catName}</h2>`;
            
            menuData[catName].forEach(item => {
                const itemHtml = `
                    <div class="price-card p-4 rounded-2xl mb-4 shadow-xl">
                        <h3 class="text-lg font-bold mb-3">${item.name}</h3>
                        <div class="flex gap-2">
                            ${item.price1 ? `<div class="flex-1 bg-zinc-800 p-2 rounded-lg text-center"><span class="block text-[10px] text-gray-400">عادي / فينو</span><span class="text-red-500 font-bold">${item.price1}ج</span></div>` : ''}
                            ${item.price2 ? `<div class="flex-1 bg-zinc-800 p-2 rounded-lg text-center"><span class="block text-[10px] text-gray-400">سوري / وسط</span><span class="text-red-500 font-bold">${item.price2}ج</span></div>` : ''}
                            ${item.price3 ? `<div class="flex-1 bg-zinc-800 p-2 rounded-lg text-center"><span class="block text-[10px] text-gray-400">XL / كبير</span><span class="text-red-500 font-bold">${item.price3}ج</span></div>` : ''}
                        </div>
                    </div>
                `;
                container.innerHTML += itemHtml;
            });
        }

        fetchMenu();
    </script>
</body>
</html>
