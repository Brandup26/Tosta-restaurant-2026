<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tosta - توستا</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-red: #e62222; --dark-black: #000000; --card-bg: #111111; --text-white: #ffffff; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--dark-black); color: var(--text-white); margin: 0; padding-bottom: 120px; }
        
        header { text-align: center; padding: 30px; background: linear-gradient(to bottom, #330000, var(--dark-black)); border-bottom: 2px solid var(--main-red); }
        .logo { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--main-red); box-shadow: 0 0 15px rgba(230, 34, 34, 0.5); }
        
        .container { max-width: 800px; margin: auto; padding: 15px; }
        .category-block { margin-bottom: 15px; }
        .category-header { 
            background: #1a1a1a; color: var(--main-red); padding: 15px; border-radius: 12px; 
            font-weight: bold; display: flex; justify-content: space-between; cursor: pointer; 
            border: 1px solid #333; transition: 0.3s;
        }
        .category-header:active { background: #222; }
        
        .menu-items { display: none; padding-top: 10px; }
        .menu-items.active { display: block; }
        
        .item { 
            background: var(--card-bg); padding: 15px; border-radius: 10px; 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 10px; border: 1px solid #222;
        }
        .item-name { font-weight: bold; font-size: 1rem; color: var(--text-white); }
        .item-price { color: var(--main-red); font-weight: bold; margin-top: 5px; font-size: 0.9rem; }
        
        .add-btn { 
            background: var(--main-red); border: none; color: white; padding: 8px 18px; 
            border-radius: 8px; cursor: pointer; font-family: 'Cairo'; font-weight: bold;
        }

        #cart-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: var(--main-red); color: white; padding: 20px; 
            text-align: center; font-weight: bold; z-index: 1000; font-size: 1.1rem;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.8);
        }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark-black); z-index: 2000; overflow-y: auto; }
        .modal-content { padding: 25px; }
        h2 { color: var(--main-red); border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        input { 
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; 
            border: 1px solid #333; background: #111; color: white; box-sizing: border-box; font-family: 'Cairo';
        }
        .send-btn { 
            width: 100%; background: #25d366; color: white; padding: 16px; 
            border: none; border-radius: 10px; font-weight: bold; font-size: 1.1rem; margin-top: 15px;
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.jpg" class="logo">
        <h1 style="margin:15px 0 5px 0; color:var(--main-red);">TOSTA - توستا</h1>
        <p style="color:#888; font-size:0.85rem;">الطعم الأصلي في كل قطمة</p>
    </header>

    <div class="container" id="menu-container"></div>

    <div id="cart-bar" onclick="openOrder()">🛒 إتمام الطلب (<span id="total-price">0</span> ج)</div>

    <div class="modal" id="orderModal">
        <div class="modal-content">
            <h2>فاتورة الطلب</h2>
            <div id="order-summary" style="margin-bottom:20px; color:#ccc; line-height: 1.8;"></div>
            <input type="text" id="custName" placeholder="الاسم بالكامل">
            <input type="tel" id="custPhone" placeholder="رقم الموبايل">
            <input type="text" id="custAddr" placeholder="العنوان بالتفصيل">
            <button class="send-btn" onclick="sendToWhatsApp()">إرسال الطلب واتساب 💬</button>
            <button onclick="closeOrder()" style="background:none; border:none; color:#888; width:100%; margin-top:25px; font-family:'Cairo'; cursor:pointer;">⬅️ العودة للمنيو</button>
        </div>
    </div>

    <script>
        const menuData = [
            { category: "ركن البيتزا 🍕", items: [
                {name: "مارجريتا", price: 75}, {name: "رومي", price: 85}, {name: "كيري", price: 85}, {name: "فلفل زيتون", price: 75},
                {name: "مشكل جبن", price: 85}, {name: "سجق", price: 90}, {name: "مفروم", price: 95}, {name: "بسطرمة", price: 95},
                {name: "فراخ", price: 95}, {name: "شاورما لحمة", price: 100}, {name: "شاورما فراخ", price: 95}, {name: "تونا", price: 95},
                {name: "سوسيس", price: 90}, {name: "صاروخ", price: 100}, {name: "مشكل لحوم", price: 100}, {name: "تشيكن رانش", price: 110}, {name: "تشيكن باربيكيو", price: 110}
            ]},
            { category: "ركن الفطير 🥐", items: [
                {name: "موتزاريلا", price: 110}, {name: "رومي", price: 110}, {name: "كيري", price: 110}, {name: "قشطة عسل", price: 100},
                {name: "مشكل جبن", price: 120}, {name: "مفروم", price: 130}, {name: "سجق", price: 130}, {name: "سوسيس", price: 130},
                {name: "بسطرمة", price: 150}, {name: "تونا", price: 140}, {name: "مشكل لحوم", price: 150}, {name: "فراخ", price: 140},
                {name: "شاورما لحمة", price: 150}, {name: "شاورما فراخ", price: 150}, {name: "مشكل فراخ", price: 160}
            ]},
            { category: "ركن الوجبات 🍱", items: [
                {name: "فاميلي استريبس (12 قطعة)", price: 350}, {name: "كريسبي استريبس (6 قطع)", price: 200},
                {name: "وجبة شيش طاووق", price: 190}, {name: "وجبة كوردن بلو", price: 190}, {name: "ميكس توستا", price: 390},
                {name: "وجبة بانية (6 قطع)", price: 190}, {name: "وجبة نص فرخة", price: 180}, {name: "وجبة ربع فرخة", price: 95}
            ]},
            { category: "كريب حادق 🌯", items: [
                {name: "بطاطس", price: 60}, {name: "شيدر", price: 65}, {name: "كيري", price: 70}, {name: "مشكل جبن", price: 75},
                {name: "بانية", price: 85}, {name: "زنجر", price: 85}, {name: "استريبس", price: 85}, {name: "شيش طاووق", price: 90},
                {name: "كوردن بلو", price: 95}, {name: "ميكس فراخ", price: 90}, {name: "فراخ بانية بسطرمة", price: 100}, {name: "زنجر كيري", price: 100},
                {name: "سوسيس", price: 80}, {name: "سجق", price: 80}, {name: "مفروم", price: 85}, {name: "بسطرمة", price: 90}, {name: "شاورما لحمة", price: 95}, {name: "ميكس لحوم", price: 100}
            ]},
            { category: "مكرونة 🍝", items: [
                {name: "مكرونة مفروم", price: 80}, {name: "مكرونة سوسيس", price: 80}, {name: "مكرونة سجق", price: 80},
                {name: "مكرونة بانية", price: 85}, {name: "مكرونة شاورما فراخ", price: 90}, {name: "مكرونة شاورما لحمة", price: 100},
                {name: "مكرونة مشكل جبن", price: 80}, {name: "مكرونة نجرسكو", price: 100}
            ]},
            { category: "حواوشي 🥙", items: [
                {name: "حواوشي بلدي", price: 50}, {name: "حواوشي موتزاريلا", price: 65}, {name: "حواوشي بسطرمة", price: 80},
                {name: "حواوشي فراخ", price: 70}, {name: "حواوشي مشكل لحوم", price: 85}
            ]},
            { category: "ساندوتشات 🌭", items: [
                {name: "بانية", price: 65}, {name: "زنجر", price: 70}, {name: "شيش طاووق", price: 75}, {name: "كوردن بلو", price: 80},
                {name: "سوسيس", price: 60}, {name: "سجق", price: 60}, {name: "كفتة", price: 70}, {name: "برجر", price: 65},
                {name: "شاورما فراخ", price: 75}, {name: "شاورما لحمة", price: 85}
            ]}
        ];

        let cart = []; let total = 0;

        function init() {
            const container = document.getElementById('menu-container');
            menuData.forEach((cat, index) => {
                container.innerHTML += `
                    <div class="category-block">
                        <div class="category-header" onclick="toggleCat(${index})">${cat.category} <span>▼</span></div>
                        <div class="menu-items" id="cat-${index}">
                            ${cat.items.map(item => `
                                <div class="item">
                                    <div class="item-info"><span class="item-name">${item.name}</span><span class="item-price">${item.price} ج</span></div>
                                    <button class="add-btn" onclick="add('${item.name}', ${item.price})">+</button>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            });
        }

        function toggleCat(id) { document.getElementById(`cat-${id}`).classList.toggle('active'); }
        function add(n, p) { cart.push({n, p}); total += p; document.getElementById('total-price').innerText = total; }
        
        function openOrder() {
            if(cart.length === 0) return alert("السلة فارغة!");
            document.getElementById('orderModal').style.display = 'block';
            document.getElementById('order-summary').innerHTML = cart.map(i => `<div>• ${i.n} (${i.p} ج)</div>`).join('');
            window.location.hash = "order";
        }
        function closeOrder() { document.getElementById('orderModal').style.display = 'none'; if(window.location.hash === "#order") history.back(); }
        window.onhashchange = function() { if(!window.location.hash) document.getElementById('orderModal').style.display = 'none'; }

        function sendToWhatsApp() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const addr = document.getElementById('custAddr').value;
            if(!name || !phone || !addr) return alert("من فضلك أكمل البيانات");
            let list = cart.map(i => i.n).join('%0A');
            let msg = `*طلب جديد من TOSTA*%0A%0A*الأصناف:*%0A${list}%0A%0A*الإجمالي:* ${total} ج%0A*الاسم:* ${name}%0A*الموبايل:* ${phone}%0A*العنوان:* ${addr}`;
            window.open(`https://wa.me/201030353060?text=${msg}`);
        }
        init();
    </script>
</body>
</html>
