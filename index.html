<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tosta - منيو توستا الكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main-red: #e62222; --dark-bg: #0d0d0d; --card-bg: #1a1a1a; --gold: #ffcc00; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--dark-bg); color: #fff; margin: 0; overflow-x: hidden; }
        
        /* الهيدر */
        header { background: #000; padding: 20px; text-align: center; border-bottom: 3px solid var(--main-red); }
        .logo { font-weight: 900; font-size: 2.5rem; color: var(--main-red); margin: 0; text-shadow: 2px 2px #000; }
        
        /* تصنيفات المنيو */
        .container { max-width: 600px; margin: 20px auto; padding: 0 15px; }
        .category-section { margin-bottom: 15px; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        .category-header { background: #222; padding: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 1.1rem; border-left: 5px solid var(--main-red); }
        .category-header:hover { background: #282828; }
        .items-list { display: none; background: #111; padding: 10px; }
        .items-list.active { display: block; }

        /* كارت الصنف */
        .item-card { background: var(--card-bg); margin-bottom: 8px; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .item-info b { display: block; font-size: 1rem; color: #eee; }
        .add-btn { background: var(--main-red); color: #fff; border: none; width: 40px; height: 40px; border-radius: 8px; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* النافذة المنبثقة (Popup) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: #1a1a1a; width: 90%; max-width: 400px; border-radius: 15px; border: 1px solid var(--main-red); padding: 20px; text-align: center; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .size-option { background: #333; padding: 15px; margin: 10px 0; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; transition: 0.2s; }
        .size-option:hover { background: var(--main-red); }
        .close-modal { margin-top: 15px; background: none; border: 1px solid #555; color: #aaa; padding: 8px 20px; border-radius: 5px; cursor: pointer; }

        /* شريط السلة */
        #cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--main-red); padding: 15px; text-align: center; font-weight: bold; font-size: 1.2rem; cursor: pointer; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); z-index: 999; }
    </style>
</head>
<body>

<header><h1 class="logo">TOSTA</h1><p style="margin:5px 0 0; color:#888;">ش الصحة القديم - متفرع من ش الشعراوي</p></header>

<div class="container" id="menu-container"></div>

<div id="cart-bar" onclick="alert('سلة الطلبات قيد التطوير')">🛒 عرض السلة (<span id="total-price">0</span> ج)</div>

<div class="modal" id="size-modal">
    <div class="modal-content">
        <h2 id="modal-item-name" style="color:var(--gold); margin-top:0;">اسم الصنف</h2>
        <p style="color:#bbb;">اختر الحجم / النوع:</p>
        <div id="size-options-container"></div>
        <button class="close-modal" onclick="closeModal()">إلغاء</button>
    </div>
</div>

<script>
const fullMenu = [
    { cat: "ركن الوجبات", items: [
        { name: "فاميلي استريبس (12 قطعة)", prices: { "وجبة": 350 } },
        { name: "كريسبي استريبس (6 قطع)", prices: { "وجبة": 200 } },
        { name: "لايت استريبس (3 قطع)", prices: { "وجبة": 120 } },
        { name: "فاميلي اكسترا (18 قطعة)", prices: { "وجبة": 430 } },
        { name: "وجبة شيش طاووق (9 قطع)", prices: { "وجبة": 190 } },
        { name: "فاميلي ميكس (3 زنجر + 3 بانية + 3 شيش)", prices: { "وجبة": 330 } },
        { name: "ميكس توستا (6 بانية + 6 استريبس)", prices: { "وجبة": 390 } },
        { name: "وجبة كوردن بلو (3 قطع)", prices: { "وجبة": 190 } },
        { name: "وجبة بانية (3 قطع)", prices: { "وجبة": 120 } },
        { name: "وجبة بانية (6 قطع)", prices: { "وجبة": 190 } },
        { name: "وجبة بانية (12 قطعة)", prices: { "وجبة": 330 } }
    ]},
    { cat: "ساندوتشات (فينو - سوري - XL)", items: [
        { name: "بطاطس", prices: { "فينو": 15, "سوري": 20, "XL": 30 } },
        { name: "كبدة", prices: { "فينو": 20, "سوري": 30, "XL": 40 } },
        { name: "جبنة مقلية", prices: { "فينو": 20, "سوري": 25, "XL": 40 } },
        { name: "بطاطس تشيز / رومي / موتزاريلا", prices: { "فينو": 30, "سوري": 35, "XL": 40 } },
        { name: "بانية / زنجر / كريسبي", prices: { "فينو": 55, "سوري": 70, "XL": 80 } },
        { name: "سجق اسكندراني", prices: { "فينو": 50, "سوري": 60, "XL": 70 } },
        { name: "تشيكن كوردن بلو", prices: { "فينو": 70, "سوري": 80, "XL": 80 } },
        { name: "كفتة لحم / فراخ", prices: { "فينو": 60, "سوري": 70, "XL": 80 } },
        { name: "جمبري كريسبي / شيش طاووق", prices: { "فينو": 80, "سوري": 90, "XL": 90 } }
    ]},
    { cat: "ركن البيتزا (44 صنف - كاملة)", items: [
        { name: "مارجريتا", prices: { "صغير": 75, "وسط": 85, "كبير": 100 } },
        { name: "رومي / كيري / مشكل جبن", prices: { "صغير": 85, "وسط": 95, "كبير": 110 } },
        { name: "مفروم / سجق / سوسيس", prices: { "صغير": 95, "وسط": 120, "كبير": 135 } },
        { name: "بسطرمة / شاورما لحمة / فراخ", prices: { "صغير": 100, "وسط": 125, "كبير": 140 } },
        { name: "تشيكن باربيكيو / رانش", prices: { "صغير": 110, "وسط": 135, "كبير": 150 } },
        { name: "زنجر / بانية / مكس فراخ", prices: { "صغير": 95, "وسط": 120, "كبير": 140 } },
        { name: "جمبري / سي فود", prices: { "صغير": 105, "وسط": 140, "كبير": 170 } },
        { name: "سوبر ستار / بركان / توستا", prices: { "صغير": 100, "وسط": 120, "كبير": 145 } },
        { name: "تونا / كواترو / مشروم", prices: { "صغير": 100, "وسط": 120, "كبير": 140 } }
    ]},
    { cat: "ركن الفطير (شرقي - اسكندراني)", items: [
        { name: "فطير مشكل جبن", prices: { "شرقي": 120, "ايطالي": 130 } },
        { name: "فطير سجق / سوسيس / مفروم", prices: { "شرقي": 130, "ايطالي": 140 } },
        { name: "فطير مشكل لحوم / شاورما", prices: { "شرقي": 150, "اسكندراني": 170 } },
        { name: "فطير زنجر / بانية / شيش", prices: { "شرقي": 150, "ايطالي": 160 } },
        { name: "فطير جمبري / سي فود", prices: { "شرقي": 170, "اسكندراني": 190 } }
    ]},
    { cat: "كريب حادق (عادي - كونو - سوبر)", items: [
        { name: "بطاطس / بوم", prices: { "عادي": 60, "كونو": 70, "سوبر": 100 } },
        { name: "مفروم / سجق / سوسيس", prices: { "عادي": 75, "كونو": 85, "سوبر": 125 } },
        { name: "بانية / كريسبي / زنجر", prices: { "عادي": 85, "كونو": 95, "سوبر": 150 } },
        { name: "برجر / مكس فراخ", prices: { "عادي": 85, "كونو": 95, "سوبر": 150 } },
        { name: "جمبري / سي فود", prices: { "عادي": 120, "كونو": 135, "سوبر": 170 } }
    ]},
    { cat: "ركن البرجر", items: [
        { name: "كلاسيك / برجر تشيز", prices: { "فراخ": 70, "لحم": 80 } },
        { name: "تشيكن رانش / فاير تاك", prices: { "ساندوتش": 90 } },
        { name: "دبل دليمار / دبل بيج فاير", prices: { "دبل": 130 } },
        { name: "تربل دليمار", prices: { "تربل": 170 } },
        { name: "سماتش برجر", prices: { "ساندوتش": 70 } }
    ]},
    { cat: "المكرونة والريزو", items: [
        { name: "مكرونة فراخ / لحمة / سجق", prices: { "أبيض": 80, "أحمر": 80 } },
        { name: "مكرونة نجرسكو / الفريدو", prices: { "طبق": 90 } },
        { name: "مكرونة سي فود", prices: { "طبق": 135 } },
        { name: "ريزو (كبدة/شاورما/زنجر)", prices: { "صغير": 70, "كبير": 90 } }
    ]}
];

let cartTotal = 0;

function renderMenu() {
    const container = document.getElementById('menu-container');
    fullMenu.forEach((section, index) => {
        let html = `
            <div class="category-section">
                <div class="category-header" onclick="toggleCat(${index})">
                    ${section.cat} <span>▼</span>
                </div>
                <div class="items-list" id="cat-${index}">
        `;
        section.items.forEach(item => {
            html += `
                <div class="item-card">
                    <div class="item-info"><b>${item.name}</b></div>
                    <button class="add-btn" onclick='openModal("${item.name}", ${JSON.stringify(item.prices)})'>+</button>
                </div>
            `;
        });
        html += `</div></div>`;
        container.innerHTML += html;
    });
}

function toggleCat(i) {
    document.getElementById(`cat-${i}`).classList.toggle('active');
}

function openModal(name, prices) {
    const modal = document.getElementById('size-modal');
    const container = document.getElementById('size-options-container');
    document.getElementById('modal-item-name').innerText = name;
    container.innerHTML = '';
    
    for (let size in prices) {
        container.innerHTML += `
            <div class="size-option" onclick="addToCart('${name}', '${size}', ${prices[size]})">
                <span>${size}</span>
                <span>${prices[size]} ج</span>
            </div>
        `;
    }
    modal.style.display = 'flex';
}

function closeModal() {
    document.getElementById('size-modal').style.display = 'none';
}

function addToCart(name, size, price) {
    cartTotal += price;
    document.getElementById('total-price').innerText = cartTotal;
    closeModal();
    // إضافة تأثير بصري بسيط
    const bar = document.getElementById('cart-bar');
    bar.style.transform = 'scale(1.05)';
    setTimeout(() => bar.style.transform = 'scale(1)', 200);
}

renderMenu();
</script>
</body>
</html>
