<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tosta - توستا</title>
    <link rel="icon" type="image/jpg" href="logo.jpg">
    <link rel="apple-touch-icon" href="logo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-red: #e62222; --dark-black: #000; --card-bg: #111; --text-white: #fff; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--dark-black); color: var(--text-white); margin: 0; padding-bottom: 120px; }
        header { text-align: center; padding: 20px; background: linear-gradient(to bottom, #400, #000); border-bottom: 2px solid var(--main-red); }
        .logo { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--main-red); margin-bottom: 10px; }
        .container { max-width: 800px; margin: auto; padding: 10px; }
        .category-block { margin-bottom: 8px; }
        .category-header { background: #1a1a1a; color: var(--main-red); padding: 15px; border-radius: 8px; font-weight: bold; display: flex; justify-content: space-between; cursor: pointer; border: 1px solid #333; }
        .menu-items { display: none; padding-top: 5px; }
        .menu-items.active { display: block; }
        .item { background: var(--card-bg); padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; border: 1px solid #222; }
        .item-info { flex: 1; }
        .item-name { font-weight: bold; font-size: 0.9rem; display: block; }
        .item-desc { font-size: 0.7rem; color: #888; }
        .item-price-row { display: flex; gap: 10px; margin-top: 5px; }
        .p-badge { background: #222; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; color: var(--main-red); border: 1px solid #444; }
        .add-btn { background: var(--main-red); border: none; color: white; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; font-family: 'Cairo'; }
        #cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--main-red); color: white; padding: 18px; text-align: center; font-weight: bold; z-index: 1000; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        input { width: 100%; padding: 15px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #111; color: white; font-family: 'Cairo'; box-sizing: border-box; }
        .send-btn { width: 100%; background: #25d366; color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body>

<header>
    <img src="logo.jpg" class="logo" alt="Tosta">
    <h2 style="margin:0; color:var(--main-red);">TOSTA - توستا</h2>
    <p style="font-size: 0.7rem; color: #aaa; margin: 5px 0;">ش الصحة القديم - متفرع من ش الشعراوي</p>
</header>

<div class="container" id="menu-container"></div>

<div id="cart-bar" onclick="openOrder()">🛒 سلة الطلبات (<span id="total-price">0</span> ج)</div>

<div class="modal" id="orderModal">
    <h2 style="color:var(--main-red)">مراجعة الطلب</h2>
    <div id="order-summary" style="background:#111; padding:15px; border-radius:10px; margin-bottom:20px; font-size:0.9rem; line-height:1.6;"></div>
    <input type="text" id="custName" placeholder="الاسم بالكامل">
    <input type="tel" id="custPhone" placeholder="رقم الموبايل">
    <input type="text" id="custAddr" placeholder="العنوان بالتفصيل">
    <button class="send-btn" onclick="sendToWhatsApp()">إرسال الطلب عبر واتساب 💬</button>
    <button onclick="closeOrder()" style="background:none; border:none; color:#888; width:100%; margin-top:20px; cursor:pointer; font-family:'Cairo';">⬅️ عودة للمنيو</button>
</div>

<script>
const menuData = [
    { category: "ركن الوجبات 🍱", items: [
        {name: "فاميلي استريبس (12 قطعة)", desc: "12 قطعة زنجر + أرز + عيش + ثومية + بطاطس", price: 350},
        {name: "كريسبي استريبس (6 قطع)", desc: "6 قطع زنجر + أرز + عيش + ثومية + بطاطس", price: 200},
        {name: "لايت استريبس (3 قطع)", desc: "3 قطع زنجر + أرز + عيش + ثومية + بطاطس", price: 120},
        {name: "فاميلي اكسترا (18 قطعة)", desc: "18 قطعة زنجر + أرز + عيش + ثومية + بطاطس", price: 430},
        {name: "وجبة شيش طاووق", desc: "9 قطع شيش + سلطات + طحينة + مخلل + أرز", price: 190},
        {name: "فاميلي ميكس", desc: "3 زنجر + 3 بانية + 3 شيش + أرز + عيش + ثومية", price: 330},
        {name: "ميكس توستا", desc: "6 بانية + 6 استريبس + 2 أرز + عيش + بيبسي", price: 390},
        {name: "وجبة كوردن بلو", desc: "3 قطع محشية بسطرمة وجبن + أرز + بطاطس", price: 190},
        {name: "وجبة بانية (6 قطع)", price: 190}, {name: "وجبة بانية (12 قطعة)", price: 330}
    ]},
    { category: "ساندوتشات (فينو - سوري - XL) 🌭", items: [
        {name: "بانية", price: "55 - 70 - 80"}, {name: "زنجر", price: "55 - 70 - 80"}, {name: "كريسبي", price: "55 - 70 - 80"},
        {name: "شيش طاووق", price: "50 - 80 - 80"}, {name: "كوردن بلو", price: "70 - 80 - 80"}, {name: "كبدة", price: "20 - 30 - 40"},
        {name: "سجق", price: "50 - 60 - 70"}, {name: "بطاطس", price: "15 - 20 - 30"}, {name: "جمبري كريسبي", price: "70 - 80 - 90"}
    ]},
    { category: "ركن البيتزا 🍕", items: [
        {name: "مارجريتا", price: "75 - 85 - 100"}, {name: "مشكل جبن", price: "85 - 95 - 110"}, {name: "شاورما فراخ", price: "95 - 120 - 135"},
        {name: "تشيكن رانش", price: "110 - 135 - 150"}, {name: "سجق / مفروم", price: "90 - 115 - 120"}, {name: "تونا", price: "100 - 120 - 145"}
    ]},
    { category: "ركن البرجر 🍔", items: [
        {name: "كلاسيك برجر", price: 70}, {name: "تشيكن رانش برجر", price: 90}, {name: "برجر دليمار", price: 100},
        {name: "بيج فاير برجر", price: 85}, {name: "تربل دليمار", price: 170}, {name: "سماتش برجر", price: 70}
    ]},
    { category: "كريب حادق 🌯", items: [
        {name: "بطاطس", price: 60}, {name: "زنجر / بانية", price: 85}, {name: "ميكس فراخ", price: 90},
        {name: "شيش طاووق", price: 90}, {name: "سي فود", price: 120}, {name: "مشكل جبن", price: 75}
    ]},
    { category: "مكرونة 🍝", items: [
        {name: "مكرونة فراخ", price: 80}, {name: "مكرونة لحمة", price: 90}, {name: "مكرونة نجرسكو", price: 90},
        {name: "مكرونة سي فود", price: 135}, {name: "مكرونة مشكل لحوم", price: 100}
    ]},
    { category: "ساندوتشات الصاروووخ 🚀", items: [
        {name: "صاروخ ميكس جبن", price: 80}, {name: "صاروخ زنجر", price: 100}, {name: "صاروخ كفتة", price: 100},
        {name: "صاروخ شاورما لحمة", price: 110}, {name: "صاروخ ميكس توستا", price: 120}
    ]},
    { category: "ركن الفطير (شرقي/إيطالي) 🥐", items: [
        {name: "موتزاريلا", price: 110}, {name: "مشكل جبن", price: 120}, {name: "سجق / مفروم", price: 130},
        {name: "بسطرمة", price: 150}, {name: "شاورما فراخ", price: 150}, {name: "سي فود", price: 180}
    ]},
    { category: "إضافات 🍟", items: [
        {name: "باكت فارم", price: 30}, {name: "موتزاريلا استيكس", price: 40}, {name: "كول سلو", price: 15}, {name: "صوص رانش / تكساس", price: 20}
    ]},
    { category: "الفطير الحلو والكريب 🍯", items: [
        {name: "فطيرة كاستر", price: 50}, {name: "فطيرة لوتس", price: 90}, {name: "كريب نوتيلا", price: 80}, {name: "كريب فواكه", price: 100}
    ]}
];

let cart = []; let total = 0;

function init() {
    const container = document.getElementById('menu-container');
    menuData.forEach((cat, index) => {
        container.innerHTML += `
            <div class="category-block">
                <div class="category-header" onclick="toggleCat(${index})">${cat.category} <span>▼</span></div>
                <div class="menu-items" id="cat-${index}">
                    ${cat.items.map(item => `
                        <div class="item">
                            <div class="item-info">
                                <span class="item-name">${item.name}</span>
                                ${item.desc ? `<span class="item-desc">${item.desc}</span>` : ''}
                                <span class="item-price">${item.price} ج</span>
                            </div>
                            <button class="add-btn" onclick="add('${item.name}', '${item.price}')">إضافة</button>
                        </div>
                    `).join('')}
                </div>
            </div>`;
    });
}

function toggleCat(id) { document.getElementById(`cat-${id}`).classList.toggle('active'); }

function add(name, price) {
    let finalPrice = parseInt(price);
    if (isNaN(finalPrice)) finalPrice = parseInt(price.split('-')[0]); // للحصول على أول سعر في الأحجام
    cart.push({name, price: finalPrice});
    total += finalPrice;
    document.getElementById('total-price').innerText = total;
}

function openOrder() {
    if(cart.length === 0) return alert("السلة فارغة!");
    document.getElementById('orderModal').style.display = 'block';
    document.getElementById('order-summary').innerHTML = cart.map(i => `<div>• ${i.name} (${i.price} ج)</div>`).join('');
    window.location.hash = "order";
}

function closeOrder() { document.getElementById('orderModal').style.display = 'none'; if(window.location.hash === "#order") history.back(); }
window.onhashchange = function() { if(!window.location.hash) document.getElementById('orderModal').style.display = 'none'; }

function sendToWhatsApp() {
    const name = document.getElementById('custName').value;
    const phone = document.getElementById('custPhone').value;
    const addr = document.getElementById('custAddr').value;
    if(!name || !phone || !addr) return alert("من فضلك أكمل بيانات التوصيل");
    let list = cart.map(i => i.name).join('%0A');
    let msg = `*طلب جديد من TOSTA*%0A%0A*الأصناف:*%0A${list}%0A%0A*الإجمالي:* ${total} ج%0A*الاسم:* ${name}%0A*الموبايل:* ${phone}%0A*العنوان:* ${addr}`;
    window.open(`https://wa.me/201030353060?text=${msg}`);
}
init();
</script>
</body>
</html>
