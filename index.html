<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tosta Menu | منيو توستا</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0c0c0c; color: white; margin-bottom: 80px; }
        .category-tab { white-space: nowrap; transition: all 0.3s; flex-shrink: 0; }
        .category-tab.active { background-color: #ff3131; color: white; box-shadow: 0 4px 15px rgba(255, 49, 49, 0.3); }
        .price-card { background: #1a1a1a; border: 1px solid #333; border-radius: 1.2rem; }
        .horizontal-scroll { overflow-x: auto; display: flex; scrollbar-width: none; }
        .horizontal-scroll::-webkit-scrollbar { display: none; }
        .cart-badge { position: absolute; top: -5px; right: -5px; background: #ff3131; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; }
        #checkout-modal { display: none; background: rgba(0,0,0,0.9); backdrop-blur: 5px; }
    </style>
</head>
<body>

    <header class="text-center py-6 bg-black border-b border-zinc-800 relative">
        <h1 class="text-4xl font-black text-red-600 tracking-tighter">TOSTA</h1>
        <div id="cart-btn" onclick="openCart()" class="absolute left-4 top-1/2 -translate-y-1/2 bg-zinc-900 p-3 rounded-full cursor-pointer border border-zinc-700">
            🛒 <span id="cart-count" class="cart-badge">0</span>
        </div>
    </header>

    <nav id="category-nav" class="horizontal-scroll sticky top-0 z-40 bg-black/95 backdrop-blur-md py-4 px-4 gap-3 border-b border-white/10"></nav>

    <main id="menu-container" class="container mx-auto px-4 py-8 max-w-md"></main>

    <div id="checkout-modal" class="fixed inset-0 z-50 overflow-y-auto p-4">
        <div class="bg-zinc-900 w-full max-w-md mx-auto rounded-3xl p-6 mt-10 border border-zinc-700">
            <h2 class="text-2xl font-bold mb-4 text-red-500 text-center">تأكيد الطلب</h2>
            <div id="cart-items-list" class="mb-6 max-h-60 overflow-y-auto space-y-3"></div>
            
            <hr class="border-zinc-800 mb-6">
            
            <div class="space-y-4">
                <input type="text" id="user-name" placeholder="الاسم بالكامل" class="w-full bg-black border border-zinc-700 p-3 rounded-xl focus:border-red-600 outline-none">
                <input type="tel" id="user-phone" placeholder="رقم الموبايل" class="w-full bg-black border border-zinc-700 p-3 rounded-xl focus:border-red-600 outline-none">
                <textarea id="user-address" placeholder="العنوان بالتفصيل (الشارع، الدور، علامة مميزة)" class="w-full bg-black border border-zinc-700 p-3 rounded-xl focus:border-red-600 outline-none h-24"></textarea>
            </div>

            <div class="mt-6 flex gap-3">
                <button onclick="sendToWhatsApp()" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl transition">إرسال للواتساب</button>
                <button onclick="closeCart()" class="px-6 bg-zinc-800 text-zinc-400 rounded-xl">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        const sheetId = '17SgECDAROBvoG2nakrWg2gjgD2DvctsxKFL-turn6-Q';
        const restaurantPhone = "201000000000"; // حط رقم الواتساب بتاعك هنا (مثال: 201012345678)
        const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

        let menuData = {};
        let cart = [];

        async function fetchMenu() {
            try {
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substring(47).slice(0, -2));
                const rows = json.table.rows;

                rows.forEach((row, index) => {
                    if (index === 0) return;
                    const cat = row.c[0]?.v || "أخرى";
                    const item = { 
                        name: row.c[1]?.v || "", 
                        prices: [row.c[2]?.v, row.c[3]?.v, row.c[4]?.v]
                    };
                    if (!menuData[cat]) menuData[cat] = [];
                    menuData[cat].push(item);
                });

                renderNav();
                renderCategory(Object.keys(menuData)[0]);
            } catch (e) { console.error(e); }
        }

        function renderNav() {
            const nav = document.getElementById('category-nav');
            Object.keys(menuData).forEach((cat, i) => {
                const btn = document.createElement('button');
                btn.className = `category-tab px-5 py-2 rounded-xl text-sm font-bold border border-zinc-700 bg-zinc-900 ${i === 0 ? 'active' : ''}`;
                btn.innerText = cat;
                btn.onclick = (e) => {
                    document.querySelectorAll('.category-tab').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderCategory(cat);
                    btn.scrollIntoView({ behavior: 'smooth', inline: 'center' });
                };
                nav.appendChild(btn);
            });
        }

        function renderCategory(catName) {
            const container = document.getElementById('menu-container');
            container.innerHTML = `<h2 class="text-xl font-bold mb-6 text-red-500 flex items-center gap-2"><span class="w-2 h-2 bg-red-500 rounded-full"></span> ${catName}</h2>`;
            
            let labels = ["صغير", "وسط", "كبير"];
            if (catName.includes("برجر")) labels = ["فراخ", "لحمة", ""];
            else if (catName.includes("مكرونة")) labels = ["أبيض", "أحمر", ""];
            else if (catName.includes("شاورما")) labels = ["فينو", "سوري", "XL"];
            else if (catName.includes("كريب حادق")) labels = ["عادي", "كونو", "سوبر"];
            else if (catName.includes("إضافات") || catName.includes("وجبات") || catName.includes("ريزو")) labels = ["السعر", "", ""];

            menuData[catName].forEach(item => {
                let parts = item.name.split('(');
                let title = parts[0].trim();
                let desc = parts[1] ? '(' + parts[1] : "";

                let html = `<div class="price-card p-4 mb-4">
                    <div class="mb-3">
                        <h3 class="font-bold text-zinc-100">${title}</h3>
                        <p class="text-[10px] text-zinc-500">${desc}</p>
                    </div>
                    <div class="flex gap-2 text-center">`;

                item.prices.forEach((p, i) => {
                    if (p && labels[i]) {
                        html += `<div onclick="addToCart('${title} - ${labels[i]}', ${p})" class="flex-1 bg-zinc-800/50 p-2 rounded-xl border border-white/5 active:bg-red-600 transition relative">
                            <span class="block text-[9px] text-zinc-500 mb-1">${labels[i]}</span>
                            <span class="text-white font-bold font-sans">${p}ج</span>
                            <div class="absolute -top-1 -right-1 bg-red-600 rounded-full w-4 h-4 text-[12px] leading-none flex items-center justify-center">+</div>
                        </div>`;
                    }
                });
                html += `</div></div>`;
                container.innerHTML += html;
            });
        }

        function addToCart(name, price) {
            const existing = cart.find(i => i.name === name);
            if (existing) existing.qty++;
            else cart.push({ name, price, qty: 1 });
            updateCartUI();
        }

        function updateCartUI() {
            const count = cart.reduce((sum, i) => sum + i.qty, 0);
            document.getElementById('cart-count').innerText = count;
        }

        function openCart() {
            if (cart.length === 0) return alert("السلة فاضية، اختار طلباتك الأول!");
            const list = document.getElementById('cart-items-list');
            list.innerHTML = "";
            let total = 0;
            cart.forEach(item => {
                total += item.price * item.qty;
                list.innerHTML += `<div class="flex justify-between text-sm bg-black p-3 rounded-lg border border-zinc-800">
                    <span>${item.qty}x ${item.name}</span>
                    <span class="text-red-500">${item.price * item.qty}ج</span>
                </div>`;
            });
            list.innerHTML += `<div class="text-center font-bold text-lg mt-4">الإجمالي: ${total} جنيه</div>`;
            document.getElementById('checkout-modal').style.display = 'block';
        }

        function closeCart() { document.getElementById('checkout-modal').style.display = 'none'; }

        function sendToWhatsApp() {
            const name = document.getElementById('user-name').value;
            const phone = document.getElementById('user-phone').value;
            const address = document.getElementById('user-address').value;

            if (!name || !phone || !address) return alert("من فضلك كمل بياناتك عشان الدليفري!");

            let msg = `*طلب جديد من Tosta*\n\n`;
            msg += `*الاسم:* ${name}\n`;
            msg += `*الموبايل:* ${phone}\n`;
            msg += `*العنوان:* ${address}\n\n`;
            msg += `*الطلبات:*\n`;
            
            let total = 0;
            cart.forEach(i => {
                msg += `- ${i.qty} x ${i.name} = ${i.qty * i.price}ج\n`;
                total += i.qty * i.price;
            });
            
            msg += `\n*الإجمالي:* ${total} جنيه`;
            
            window.open(`https://wa.me/${restaurantPhone}?text=${encodeURIComponent(msg)}`);
        }

        window.onload = fetchMenu;
    </script>
</body>
</html>
