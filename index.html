<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم توستا - الأكل بشكل تاني ❤️</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tosta">
    <link rel="apple-touch-icon" href="Tosta.jpg">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff3131">

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0c0c0c; color: white; margin-bottom: 80px; overflow-x: hidden; scroll-behavior: smooth; }
        .header-wrapper { position: sticky; top: 0; z-index: 100; background-color: black; border-bottom: 1px solid #27272a; }
        .sticky-header { padding: 25px 0; text-align: center; }
        .sticky-nav { background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px); padding: 15px 0; }
        .category-tab { white-space: nowrap; transition: all 0.3s; flex-shrink: 0; border: 1px solid #3f3f46; border-radius: 12px; padding: 10px 22px; font-size: 14px; font-weight: bold; background: #000; color: #a1a1aa; }
        .category-tab.active { background-color: #ff3131; color: white; border-color: #ff3131; box-shadow: 0 4px 15px rgba(255, 49, 49, 0.3); }
        .horizontal-scroll { overflow-x: auto; display: flex; scrollbar-width: none; gap: 10px; padding: 0 15px; }
        .horizontal-scroll::-webkit-scrollbar { display: none; }
        
        .price-card { background: #1a1a1a; border: 1px solid #333; border-radius: 1.2rem; overflow: hidden; position: relative; padding: 15px; margin-bottom: 15px; }
        
        /* تصميم الوجبات المنظم */
        .meal-card { background: #161616; border: 1px solid #27272a; border-radius: 1.2rem; padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .meal-info { display: flex; flex-direction: column; gap: 4px; }
        
        /* زر شراء أصغر وأشيك */
        .meal-price-btn { background: #ff3131; color: white; padding: 6px 14px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; text-align: center; min-width: 70px; }
        .meal-price-btn:active { scale: 0.92; }
        .meal-price-btn span { display: block; line-height: 1.2; }

        .plus-icon { position: absolute; top: 0; right: 0; background: #ff3131; color: white; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; border-radius: 0 0 0 10px; }
        .logo-container img { max-width: 100px; margin: 0 auto 8px; display: block; border-radius: 15px; }
        .input-field { width: 100%; border: 1px solid #27272a; padding: 16px; border-radius: 15px; color: white; outline: none; background: #000; text-align: right; }
        .input-field:focus { border-color: #ff3131; }
        .designer-box { margin-top: 50px; padding: 30px 20px; border-top: 1px solid #27272a; text-align: center; color: #71717a; font-size: 13px; background: #050505; }
        .designer-box a { color: #ff3131; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header-wrapper" id="top-anchor">
        <header class="sticky-header">
            <div class="logo-container">
                <img src="Tosta.jpg" alt="Tosta Logo" onerror="this.style.display='none'">
            </div>
            <h1 class="text-2xl font-black text-red-600">مطعم توستا</h1>
            <p class="text-sm text-zinc-400 mt-1">الأكل بشكل تاني ❤️</p>
            <p class="text-[11px] text-zinc-500 mt-1">ش الصحة القديم - متفرع من ش الشعراوي</p>
            
            <div id="cart-btn" onclick="openCart()" class="absolute left-4 top-8 bg-zinc-900 p-3 rounded-full cursor-pointer border border-zinc-700 shadow-lg active:scale-95 transition-transform">
                🛒 <span id="cart-count" class="absolute -top-1 -right-1 bg-red-600 text-[10px] font-bold rounded-full w-5 h-5 flex items-center justify-center">0</span>
            </div>
        </header>
        <nav id="category-nav" class="sticky-nav horizontal-scroll"></nav>
    </div>

    <main id="menu-container" class="container mx-auto px-4 py-6 max-w-md"></main>

    <div class="designer-box">
        <p dir="ltr">Designed by Eng / <span class="text-white">Anas Gaber Shehata</span></p>
        <p class="mt-2" dir="ltr">📞 <a href="tel:01003800314">01003800314</a></p>
        <p class="mt-4 text-[10px]">جميع الحقوق محفوظة لمطعم توستا © 2026</p>
    </div>

    <div id="checkout-modal" class="fixed inset-0 z-[150] hidden bg-black/95 backdrop-blur-md p-4 overflow-y-auto">
        <div class="bg-zinc-900 w-full max-w-md mx-auto rounded-3xl p-6 mt-6 border border-zinc-700 shadow-2xl">
            <h2 class="text-2xl font-bold mb-6 text-red-500 text-center">تفاصيل الطلب</h2>
            <div id="cart-items-list" class="mb-6 space-y-3"></div>
            <div id="total-price-display" class="text-center font-bold text-xl mb-6 bg-zinc-800 py-4 rounded-2xl text-red-500"></div>
            <div class="space-y-4">
                <input type="text" id="user-name" placeholder="الاسم بالكامل" class="input-field">
                <input type="tel" id="user-phone" placeholder="رقم الموبايل" class="input-field">
                <textarea id="user-address" placeholder="العنوان بالتفصيل" class="input-field h-24"></textarea>
            </div>
            <div class="mt-8 flex gap-3">
                <button onclick="sendToWhatsApp()" class="flex-1 bg-green-600 font-bold py-4 rounded-2xl text-white shadow-lg">إرسال للواتساب</button>
                <button onclick="closeCart()" class="px-6 bg-zinc-800 text-zinc-400 rounded-2xl font-bold">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => console.log("Service Worker Registered"));
        }

        const sheetId = '17SgECDAROBvoG2nakrWg2gjgD2DvctsxKFL-turn6-Q';
        const restaurantPhone = "201032512003";
        const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&cache_bust=${Date.now()}`;

        let menuData = {};
        let cart = [];

        async function fetchMenu() {
            try {
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substring(47).slice(0, -2));
                const rows = json.table.rows;
                menuData = {};
                rows.forEach((row, index) => {
                    if (index === 0) return;
                    const cat = row.c[0]?.v || "أخرى";
                    const item = { category: cat, name: row.c[1]?.v || "", prices: [row.c[2]?.v, row.c[3]?.v, row.c[4]?.v] };
                    if (!menuData[cat]) menuData[cat] = [];
                    menuData[cat].push(item);
                });
                renderNav();
                renderCategory(Object.keys(menuData)[0]);
            } catch (e) { console.error(e); }
        }

        function renderNav() {
            const nav = document.getElementById('category-nav');
            nav.innerHTML = "";
            Object.keys(menuData).forEach((cat, i) => {
                const btn = document.createElement('button');
                btn.className = `category-tab ${i === 0 ? 'active' : ''}`;
                btn.innerText = cat;
                btn.onclick = () => {
                    document.querySelectorAll('.category-tab').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderCategory(cat);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                };
                nav.appendChild(btn);
            });
        }

        function renderCategory(catName) {
            const container = document.getElementById('menu-container');
            container.innerHTML = `<h2 class="text-xl font-bold mb-6 text-red-500 border-r-4 border-red-500 pr-3">${catName}</h2>`;
            
            let isMeal = catName.includes("وجبات") || catName.includes("الوجبات");
            let labels = ["السعر", "وسط", "كبير"];
            
            menuData[catName].forEach(item => {
                if (isMeal) {
                    let price = item.prices[0];
                    // فحص السعر: لا يظهر الزر إذا كان السعر 0 أو غير موجود
                    let priceHtml = (price && price > 0) ? `
                        <div onclick="addToCart('${item.category}', '${item.name}', ${price})" class="meal-price-btn">
                            <span class="text-[10px] opacity-80">إضافة</span>
                            <span class="text-sm font-black">${price}ج</span>
                        </div>` : `<span class="text-zinc-600 text-xs italic">غير متوفر</span>`;

                    container.innerHTML += `
                        <div class="meal-card">
                            <div class="meal-info">
                                <h3 class="font-bold text-white text-[15px]">${item.name}</h3>
                                <p class="text-zinc-500 text-[11px]">أجمد وجبة من توستا 🔥</p>
                            </div>
                            ${priceHtml}
                        </div>`;
                } else {
                    let html = `<div class="price-card"><h3 class="font-bold text-zinc-100 mb-4 text-right">${item.name}</h3><div class="flex gap-2">`;
                    item.prices.forEach((p, i) => {
                        if (p && p > 0) {
                            html += `<div onclick="addToCart('${item.category}', '${item.name} (${labels[i] || 'السعر'})', ${p})" class="flex-1 bg-zinc-800/60 p-3 rounded-2xl border border-white/5 relative cursor-pointer text-center active:bg-red-600/30">
                                <span class="block text-[10px] text-zinc-400 mb-1">${labels[i] || 'السعر'}</span>
                                <span class="text-white font-bold">${p}ج</span>
                                <div class="plus-icon">+</div>
                            </div>`;
                        }
                    });
                    html += `</div></div>`;
                    container.innerHTML += html;
                }
            });
        }

        function addToCart(cat, name, price) {
            const existing = cart.find(i => i.name === name);
            if (existing) existing.qty++; else cart.push({ cat, name, price, qty: 1 });
            updateCartUI();
        }

        function openCart() {
            if (cart.length === 0) return alert("السلة فارغة!");
            const list = document.getElementById('cart-items-list');
            list.innerHTML = ""; let total = 0;
            cart.forEach((item, index) => {
                total += item.price * item.qty;
                let cleanCat = item.cat.replace("ركن ", "").replace("قسم ", "").trim();
                let cleanName = item.name.replace(cleanCat, "").trim();
                
                list.innerHTML += `<div class="flex justify-between items-center bg-black p-4 rounded-xl border border-zinc-800 text-right">
                    <button onclick="removeFromCart(${index})" class="text-red-500 font-bold px-3">حذف</button>
                    <div>
                        <div class="text-white font-bold text-sm">${cleanCat} ${cleanName}</div>
                        <div class="text-zinc-500 text-xs mt-1">${item.qty} × ${item.price}ج = ${item.qty * item.price}ج</div>
                    </div>
                </div>`;
            });
            document.getElementById('total-price-display').innerText = `إجمالي الحساب: ${total} جنيه`;
            document.getElementById('checkout-modal').classList.remove('hidden');
            window.history.pushState({modalOpen: true}, "");
        }

        window.onpopstate = function() { if (!document.getElementById('checkout-modal').classList.contains('hidden')) closeCart(); };
        function removeFromCart(idx) { cart.splice(idx, 1); if(cart.length === 0) closeCart(); else openCart(); updateCartUI(); }
        function updateCartUI() { document.getElementById('cart-count').innerText = cart.reduce((s, i) => s + i.qty, 0); }
        function closeCart() { document.getElementById('checkout-modal').classList.add('hidden'); }

        function sendToWhatsApp() {
            const name = document.getElementById('user-
