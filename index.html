    <title>Tosta - توستا</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #e62222; --gold: #ffcc00; --bg: #000; --card: #111; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 80px; }
        header { text-align: center; padding: 20px; background: linear-gradient(to bottom, #300, #000); border-bottom: 3px solid var(--red); }
        .logo { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--red); margin-bottom: 10px; }
        .container { max-width: 800px; margin: auto; padding: 10px; }
        .cat-header { background: #1a1a1a; color: var(--red); padding: 15px; border-radius: 8px; margin-top: 10px; cursor: pointer; border: 1px solid #333; display: flex; justify-content: space-between; font-weight: bold; }
        .items-list { display: none; margin-bottom: 10px; }
        .items-list.active { display: block; }
        .item { background: var(--card); padding: 12px; border-radius: 8px; margin-bottom: 6px; border-right: 4px solid var(--red); display: flex; justify-content: space-between; align-items: center; }
        .p-box { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px; }
        .p-tag { background: #222; color: var(--gold); font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; border: 1px solid #444; }
        .add { background: var(--red); color: #fff; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-weight: bold; }
        #cart-bar { position: fixed; bottom: 0; width: 100%; background: var(--red); padding: 18px; text-align: center; font-weight: bold; cursor: pointer; z-index: 100; font-size: 1.1rem; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 200; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #333; background: #111; color: #fff; font-family: 'Cairo'; box-sizing: border-box; }
        .btn-send { width: 100%; background: #25d366; color: #fff; padding: 15px; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <img src="logo.jpg" class="logo">
    <h1 style="margin:0; font-size:1.4rem;">مطعم TOSTA - توستا</h1>

    <input type="text" id="cName" placeholder="الاسم بالكامل">
    <input type="tel" id="cPhone" placeholder="رقم الموبايل">
    <input type="text" id="cAddr" placeholder="العنوان بالتفصيل">
    <button class="btn-send" onclick="send()">إرسال واتساب</button>
    <button onclick="closeCart()" style="width:100%; background:none; border:none; color:#777; margin-top:20px; font-family:'Cairo';">رجوع</button>

let cart = []; let total = 0;
function init() {
    const target = document.getElementById('menu-target');
    fullMenu.forEach((s, idx) => {
        let html = `<div class="cat-header" onclick="togg(${idx})">${s.cat} <span>▼</span></div><div class="items-list" id="s-${idx}">`;
        s.items.forEach(i => {
            let prs = String(i.p).split('-');
            let pTags = prs.map(p => `<span class="p-tag">${p} ج</span>`).join('');
            html += `<div class="item"><div><b>${i.n}</b><br><small style="color:#666">${i.d||''}</small><div class="p-box">${pTags}</div></div><button class="add" onclick="addC('${i.n}', ${prs[0]})">+</button></div>`;
        });
        target.innerHTML += html + '</div>';
    });
}
function togg(i) { document.getElementById('s-'+i).classList.toggle('active'); }
function addC(n, p) { cart.push({n, p}); total += p; document.getElementById('total').innerText = total; }
function openCart() {
    if(cart.length==0) return alert('السلة فارغة');
    document.getElementById('modal').style.display='block';
    document.getElementById('summary').innerHTML = cart.map(i => `<div>• ${i.n} (${i.p} ج)</div>`).join('');
}
function closeCart() { document.getElementById('modal').style.display='none'; }
function send() {
    let name = document.getElementById('cName').value;
    let addr = document.getElementById('cAddr').value;
    if(!name || !addr) return alert('برجاء كتابة الاسم والعنوان');
    let msg = `*طلب جديد من توستا*%0A*الاسم:* ${name}%0A*العنوان:* ${addr}%0A*الأصناف:*%0A${cart.map(i=>i.n).join('%0A')}%0A*الإجمالي:* ${total} ج`;
    window.open(`https://wa.me/201030353060?text=${msg}`);
}
init();

</html>
